# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  mongodb:
    image: 'mongo:7.0'
    container_name: mongodb
    restart: always
    # P5 — when MONGO_INITDB_ROOT_USERNAME + MONGO_INITDB_ROOT_PASSWORD
    # are set (in `../.env`), Mongo's official entrypoint enables `--auth`
    # automatically AND seeds the root user on the very first boot
    # (against an empty data dir). On subsequent boots it just enforces
    # auth — the seeded user already exists. App-side reads are wired by
    # `MONGO_USER`/`MONGO_PASS` (built into the URI by mongoConfig.ts).
    # Leaving all four unset preserves the unauthenticated dev path
    # — the dev compose file doesn't set them.
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-}
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo mongodb://mongodb:27017/ --quiet
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      # Bind mounts here use `../` because compose.yaml lives in
      # `infra/` (post-refactor) but the droplet still keeps persistent
      # state (mongo data, user uploads) at the repo root
      # `/opt/cms/{mongo_data,uploads}/`. Resolving `.` to the compose-
      # file directory would orphan that data.
      - ../mongo_data:/data/db
    # No public `ports:` mapping — Mongo must only be reachable from the
    # `server` container over the internal `db` network. Publishing 27017
    # to the host exposed it to the internet (DO security scan flagged it).
    networks:
      - db
      - back-end
      - front-end
  server:
    container_name: server
    build:
      context: ..
      dockerfile: infra/ServerDockerfile
    depends_on:
      mongodb: {
        condition: service_started
      }
    # `../.env` — compose is in `infra/`, so a plain `.env` would resolve
    # to `infra/.env`. Droplet writes `.env` at the repo root via the
    # deploy script and server-init, same convention as mongo_data/uploads.
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test:  curl --fail "http://server:3000?query=%7B%0A%09sample%0A%7D%0A" || exit 1
      interval: 10s
    command: npm run standalone-graphql-docker
    networks:
      - db
      - back-end
    ports:
      - 3000:3000
    expose:
      - 3000
  app:
    image: node-app
    container_name: front
    depends_on:
      mongodb: {
        condition: service_started
      }
      server: {
        condition: service_healthy
      }
    command: npm run start-docker
    build:
      context: ..
      dockerfile: infra/AppDockerfile
    env_file:
      - ../.env
    environment:
      - BUILD_PORT=3000
      # SMTP credentials for the public contact form ("Send a brief").
      # The `*_FILE` form is the standard Docker secrets convention —
      # each var points to a file mounted at `/run/secrets/<name>` and
      # the inquiry mailer reads its content at request time. Operators
      # rotate creds by replacing the secret file on disk; no `.env`
      # edit, no rebuild. Plain `SMTP_USER` / `SMTP_PASS` / `MAIL_FROM`
      # in `.env` still work as a fallback for non-secret deployments.
      - SMTP_HOST_FILE=/run/secrets/smtp_host
      - SMTP_PORT_FILE=/run/secrets/smtp_port
      - SMTP_USER_FILE=/run/secrets/smtp_user
      - SMTP_PASS_FILE=/run/secrets/smtp_pass
      - MAIL_FROM_FILE=/run/secrets/mail_from
    secrets:
      - smtp_host
      - smtp_port
      - smtp_user
      - smtp_pass
      - mail_from
    volumes:
      - ../uploads/images:/app/ui/client/public/images
      # Per-site theme/design bundles. `bundles` is the generic name;
      # `design-v2` is kept as a back-compat mount because existing DB
      # content on funisimo.pro (and eventually skyclimber.pro) still
      # references `/design-v2/*` URLs.
      - ../uploads/bundles:/app/ui/client/public/bundles
      - ../uploads/design-v2:/app/ui/client/public/design-v2
    networks:
      - db
      - front-end
      - back-end
    expose:
      - 80
    healthcheck:
      # Next serves a 200 on `/` once static generation has warmed up.
      # The smoke check in CI + the zero-downtime `up --no-deps app`
      # rely on this reporting `healthy` before Caddy starts reverse-
      # proxying again. `start_period` is generous because a cold-boot
      # build on the small droplet needs a minute or two to warm the
      # ISR cache.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
  # --- P4: blue/green app instances ---
  # These live behind the same Caddy upstream switch — only ONE serves
  # traffic at any moment (selected by `ACTIVE_UPSTREAM`). They're gated
  # by the `seamless` Compose profile so single-instance dev (and the
  # legacy P2 production path, which still uses the `app` service above)
  # are unaffected. To opt in:
  #   docker compose --profile seamless -f infra/compose.yaml up -d
  # Each instance mirrors `app` exactly except:
  #   * Distinct container_name (so `docker exec` / log reads target
  #     the right side).
  #   * `IS_LEADER` env — boot-once code (font cache warm, scheduled
  #     task registration, restart-required marker reset) ONLY runs on
  #     the blue instance. We picked the env-flag strategy (NOT a Redis
  #     leader-election lock) because:
  #       - one less moving part: no lease renewal, no split-brain
  #         window, no extra Redis traffic per boot
  #       - blue is canonically the "default active" (matches Caddy's
  #         fallback `app-blue:80`), so the leader always exists at
  #         boot regardless of which side is currently serving traffic
  #       - the failure mode (green never runs boot-once code) is
  #         exactly what we want — green is a hot standby for traffic,
  #         not a second writer of singleton state
  #     Trade-off: if blue is down during a deploy, boot-once code
  #     won't run until blue comes back. Acceptable because boot-once
  #     code is idempotent and the next blue boot picks it up.
  app-blue:
    profiles: ['seamless']
    image: node-app
    container_name: app-blue
    depends_on:
      mongodb: { condition: service_started }
      server: { condition: service_healthy }
    command: npm run start-docker
    build:
      context: ..
      dockerfile: infra/AppDockerfile
    env_file:
      - ../.env
    environment:
      - BUILD_PORT=3000
      - IS_LEADER=1
      - SMTP_HOST_FILE=/run/secrets/smtp_host
      - SMTP_PORT_FILE=/run/secrets/smtp_port
      - SMTP_USER_FILE=/run/secrets/smtp_user
      - SMTP_PASS_FILE=/run/secrets/smtp_pass
      - MAIL_FROM_FILE=/run/secrets/mail_from
    secrets: [smtp_host, smtp_port, smtp_user, smtp_pass, mail_from]
    volumes:
      - ../uploads/images:/app/ui/client/public/images
      - ../uploads/bundles:/app/ui/client/public/bundles
      - ../uploads/design-v2:/app/ui/client/public/design-v2
    networks: [db, front-end, back-end]
    expose: ['80']
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
  app-green:
    profiles: ['seamless']
    image: node-app
    container_name: app-green
    depends_on:
      mongodb: { condition: service_started }
      server: { condition: service_healthy }
    command: npm run start-docker
    build:
      context: ..
      dockerfile: infra/AppDockerfile
    env_file:
      - ../.env
    environment:
      - BUILD_PORT=3000
      - IS_LEADER=0
      - SMTP_HOST_FILE=/run/secrets/smtp_host
      - SMTP_PORT_FILE=/run/secrets/smtp_port
      - SMTP_USER_FILE=/run/secrets/smtp_user
      - SMTP_PASS_FILE=/run/secrets/smtp_pass
      - MAIL_FROM_FILE=/run/secrets/mail_from
    secrets: [smtp_host, smtp_port, smtp_user, smtp_pass, mail_from]
    volumes:
      - ../uploads/images:/app/ui/client/public/images
      - ../uploads/bundles:/app/ui/client/public/bundles
      - ../uploads/design-v2:/app/ui/client/public/design-v2
    networks: [db, front-end, back-end]
    expose: ['80']
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
  # --- MCP HTTP transport — remote AI access to the CMS ---
  # Same image as `app` (we reuse the bundled tsx + service tree); just a
  # different command. Bound only to the back-end network, never exposes
  # a public port — Caddy proxies `https://${DOMAIN}/mcp` to it on
  # `mcp:8788`. Auth is bearer-token (issued at /admin/system/mcp); Caddy
  # adds an IP allowlist via `MCP_ALLOWED_IPS` for defense in depth.
  #
  # Default `replicas: 1` is fine — MCP traffic is operator/agent-driven,
  # not customer-facing, so seamless deploy isn't required. A restart =
  # disconnected sessions; the client reconnects.
  mcp:
    image: node-app
    container_name: mcp
    depends_on:
      mongodb: { condition: service_started }
    build:
      context: ..
      dockerfile: infra/AppDockerfile
    command: npm run mcp:http
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - MCP_HTTP_ENABLED=true
      - MCP_HTTP_BIND=0.0.0.0
      - MCP_HTTP_PORT=8788
      # IP allowlist applied INSIDE the process — strictest gate. Caddy
      # also enforces (see Caddyfile @mcp-allow). Empty value = trust
      # whatever Caddy let through.
      - MCP_HTTP_ALLOWED_IPS=${MCP_HTTP_ALLOWED_IPS:-}
    volumes:
      # MCP tools that touch the filesystem (bundle.export/import,
      # image.upload, log.tail) operate on the same uploads tree the
      # app writes to, so files end up where Next can serve them.
      - ../uploads/images:/app/ui/client/public/images
      - ../uploads/bundles:/app/ui/client/public/bundles
      - ../uploads/design-v2:/app/ui/client/public/design-v2
    networks:
      # `front-end` is required so Caddy (which lives only on front-end)
      # can resolve `mcp` for the /mcp reverse-proxy. `db` for Mongo,
      # `back-end` for symmetry with the other app services.
      - db
      - back-end
      - front-end
    expose:
      - 8788
    healthcheck:
      # Use 127.0.0.1 explicitly — on Alpine, `localhost` resolves to
      # `::1` (IPv6) first, but Express binds to 0.0.0.0 (IPv4 only) so
      # the v6 lookup gets ECONNREFUSED and the container falsely reports
      # unhealthy. Caught on funisimo first MCP deploy 2026-05-06.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8788/healthz | grep -q '\"ok\":true' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      app: { condition: service_started }
      mcp: { condition: service_started }
    environment:
      # Site address for the Caddyfile. Set DOMAIN in .env per droplet
      # (e.g. DOMAIN=skyclimber.pro). Falls back to :80 so the proxy still
      # works without a domain — useful when DNS isn't wired up yet.
      - DOMAIN=${DOMAIN:-:80}
      # Optional `www` vhost — Caddy 301s it to the apex. Defaults to a
      # harmless `www.localhost` so dev boots don't try to obtain a cert
      # for a hostname the operator hasn't declared. See P3 in
      # docs/runbooks/digitalocean-domain.md.
      - SITE_DOMAIN_WWW=${SITE_DOMAIN_WWW:-www.localhost}
      # P4 — blue/green upstream marker. `tools/blue-green-deploy.sh`
      # rewrites `.env`'s `ACTIVE_UPSTREAM` line + `docker compose up
      # -d --no-deps caddy` (or `caddy reload`) on every flip. Default
      # `app:80` keeps the legacy single-instance path working when
      # the seamless profile is off.
      - ACTIVE_UPSTREAM=${ACTIVE_UPSTREAM:-app:80}
      # Caddy-side IP allowlist for the /mcp route. Comma-separated CIDR
      # or literal IPs (e.g. `198.51.100.0/24,203.0.113.7`). Empty =
      # bearer token is the only gate — set this to your office / VPN
      # CIDRs in `.env` for defense in depth.
      - MCP_ALLOWED_CIDR=${MCP_ALLOWED_CIDR:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      # Caddyfile + maintenance page sit alongside compose.yaml in
      # `infra/`, so plain `./` paths are correct for these.
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./maintenance:/srv/maintenance:ro
      # Uploads live at repo root (persistent across refactors); reach
      # them via `../` — see comment on mongo_data above.
      - ../uploads:/srv/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - front-end
networks:
  front-end:
  db:
  back-end:
volumes:
  caddy_data:
  caddy_config:
secrets:
  # SMTP credentials for the public contact form. Each secret is a
  # one-line file at the path below — replace the file and re-run
  # `docker compose up -d app` to roll the credentials. The
  # transporter cache invalidates automatically on signature change
  # (see `_inquiryMailer.ts`).
  #
  # Initial set-up on the droplet:
  #   sudo mkdir -p /opt/cms/secrets && sudo chmod 700 /opt/cms/secrets
  #   echo -n 'mail.inbox.lv'        | sudo tee /opt/cms/secrets/smtp_host  >/dev/null
  #   echo -n '465'                  | sudo tee /opt/cms/secrets/smtp_port  >/dev/null
  #   echo -n 'noreply@example.com'  | sudo tee /opt/cms/secrets/smtp_user  >/dev/null
  #   echo -n 'super-secret-pass'    | sudo tee /opt/cms/secrets/smtp_pass  >/dev/null
  #   echo -n 'Funisimo <noreply@…>' | sudo tee /opt/cms/secrets/mail_from  >/dev/null
  #   sudo chmod 600 /opt/cms/secrets/*
  #
  # `echo -n` matters — a trailing newline lands in the secret file
  # and most SMTP servers reject auth with the trailing whitespace.
  # The mailer also `.trim()`s defensively, but this avoids surprises.
  smtp_host:
    file: ../secrets/smtp_host
  smtp_port:
    file: ../secrets/smtp_port
  smtp_user:
    file: ../secrets/smtp_user
  smtp_pass:
    file: ../secrets/smtp_pass
  mail_from:
    file: ../secrets/mail_from