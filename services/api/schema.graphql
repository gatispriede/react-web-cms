type IAddress {
    id: String!
    name: String!
    line1: String!
    line2: String
    city: String!
    postalCode: String!
    country: String!
    isDefault: Boolean
}

type ICustomer {
    id: String!
    name: String
    email: String!
    phone: String
    emailVerified: String
    shippingAddresses: [IAddress!]!
    createdAt: String
}
type INewLanguage {
    label: String!
    symbol: String!
    default: Boolean
    flag: String
    version: Int
    editedBy: String
    editedAt: String
}
type IUser {
    id: String!
    name: String
    email: String!
    password: String!
    role: String
    avatar: String
    # `kind` distinguishes admin/customer/editor/viewer docs. Authoritative
    # for NextAuth's customer-credentials authorize() — without it, every
    # customer login is rejected (gqty proxy returns undefined → kind check
    # fails). Was already on `InUser` (input); the output side parity here
    # closes the loop.
    kind: String
    canPublishProduction: Boolean
    mustChangePassword: Boolean
    preferredAdminLocale: String
}

type ILogo {
    id: String
    type: String
    content: String!
    version: Int
    editedBy: String
    editedAt: String
}

type IImage {
    id: String!
    name: String!
    location: String!
    created: String!
    type: String!
    size: Int!
    tags: [String]!
}

type IItem {
    name: String
    type: String!
    style: String
    content: String!
    action: String
    actionStyle: String
    actionType: String
    actionContent: String
    animation: String
}
type ISection {
    id: String
    page: String
    type: Int!
    content: [IItem]
    slots: [Int]
    overlay: Boolean
    overlayAnchor: String
    """Cross-cutting transparent-background flag — see InSection.transparent."""
    transparent: Boolean
    """Section opacity 0..100 (%). See InSection.transparentOpacity."""
    transparentOpacity: Int
    """Optimistic-concurrency counter — see src/Server/conflict.ts."""
    version: Int
    editedBy: String
    editedAt: String
}
type ISeo {
    description: String
    keywords: [String]
    viewport: String
    charSet: String
    url: String
    image: String
    image_alt: String
    published_time: String
    modified_time: String
    author: String
    locale: String
}
type INavigation {
    id: String
    type: String!
    page: String!
    seo: ISeo
    sections: [String]!
    editedBy: String
    editedAt: String
}

type ILoadData {
    name: String
    sizeOnDisk: Float
    empty: Boolean
}

type QueryMongo {
    setupAdmin: IUser
    getMongoDBUri: String
    loadData: [ILoadData!]!
    getNavigationCollection: [INavigation!]!
    getSections(ids: [String]): [ISection!]!
    getImages(tags: String!): [IImage!]!
    getLogo: ILogo
    getUser(email: String): IUser
    getUsers: [IUser!]!
    getLanguages: [INewLanguage]
    getPublishedSnapshot: String
    getPublishedMeta: String
    getThemes: String!
    getActiveTheme: String
    getPublishedHistory(limit: Int): String!
    getPosts(includeDrafts: Boolean, limit: Int): String!
    getPost(slug: String!, includeDrafts: Boolean): String
    getProducts(includeDrafts: Boolean, limit: Int, category: String, inStockOnly: Boolean, source: String): String!
    getProduct(slug: String!, includeDrafts: Boolean): String
    searchProducts(q: String!, limit: Int, includeDrafts: Boolean): String!
    getFooter: String!
    getSiteFlags: String!
    getSiteSeo: String!
    getTranslationMeta: String!
    getAuditLog(filter: JSON): String!
    getAuditCollections: String!
    getAuditActors: String!
    me: ICustomer
    cart: String!
    inventoryStatus: String!
    inventoryReadDeadLetters(limit: Int): String!
    """Customer-only — current customer's order history."""
    myOrders(limit: Int): String!
    """Customer-only — single order by id (IDOR-checked)."""
    myOrder(id: String!): String
    """Guest confirmation page — token must match the `order_token` cookie."""
    orderByToken(token: String!): String
    """Admin/editor — paged order list."""
    adminOrders(status: String, limit: Int): String!
    """Admin/editor — order detail."""
    adminOrder(id: String!): String
    """Static shipping methods table; reserved for future per-order rates."""
    shippingMethodsFor(orderId: String!): String!
    """Admin-only — list issued MCP tokens (no secrets returned)."""
    mcpListTokens: String!
}

scalar JSON

type MutationMongo {
    createNavigation(navigation: InNavigation!): String!
    addUpdateNavigationItem(pageName: String!, sections: [String]): String!
    updateNavigation(page: String!, sections: [String]): String!
    replaceUpdateNavigation(oldPageName: String!,navigation: InNavigation): String!
    addUpdateSectionItem(section: InSection!, pageName: String, expectedVersion: Int): String!
    removeSectionItem(id:String!): String!
    deleteNavigationItem(pageName:String!): String!
    saveImage(image: InImage!): String!
    deleteImage(id: String!): String!
    saveLogo(content: String!, expectedVersion: Int): String!
    addUpdateLanguage(language: InLanguage, translations: JSON, expectedVersion: Int): String!
    deleteLanguage(language: InLanguage): String!
    addUser(user: InUser!): String!
    updateUser(user: InUser!): String!
    removeUser(id: String!): String!
    publishSnapshot(note: String): String!
    rollbackToSnapshot(id: String!): String!
    saveTheme(theme: JSON!, expectedVersion: Int): String!
    deleteTheme(id: String!): String!
    setActiveTheme(id: String!): String!
    resetPreset(id: String!): String!
    savePost(post: JSON!, expectedVersion: Int): String!
    deletePost(id: String!): String!
    setPostPublished(id: String!, publish: Boolean!): String!
    saveProduct(product: JSON!, expectedVersion: Int): String!
    deleteProduct(id: String!): String!
    setProductPublished(id: String!, publish: Boolean!): String!
    saveFooter(config: JSON!, expectedVersion: Int): String!
    saveSiteFlags(flags: JSON!, expectedVersion: Int): String!
    saveSiteSeo(seo: JSON!, expectedVersion: Int): String!
    saveTranslationMeta(meta: JSON!, expectedVersion: Int): String!
    signUpCustomer(customer: InUser!): String!
    updateMyProfile(customer: InUser!): String!
    changeMyPassword(oldPassword: String!, newPassword: String!): String!
    saveMyAddress(address: InAddress!): String!
    deleteMyAddress(id: String!): String!
    cartAddItem(productId: String!, sku: String!, qty: Int!): String!
    cartUpdateQty(productId: String!, sku: String!, qty: Int!): String!
    cartRemoveItem(productId: String!, sku: String!): String!
    cartClear: String!
    inventorySyncAll: String!
    inventorySyncDelta: String!
    inventorySaveAdapterConfig(config: JSON!): String!
    """Snapshot cart -> Order, reserve stock, status:pending. Customer or guest (when allowGuestCheckout)."""
    createDraftOrder(cartId: String, currency: String!, guestEmail: String): String!
    attachOrderAddress(orderId: String!, shipping: JSON!, billing: JSON): String!
    attachOrderShipping(orderId: String!, methodCode: String!): String!
    authorizeOrderPayment(orderId: String!, card: JSON!, idempotencyKey: String!): String!
    finalizeOrder(orderId: String!, idempotencyKey: String!): String!
    cancelOrder(orderId: String!): String!
    """Admin: state-machine transition (editor)."""
    adminTransitionOrder(orderId: String!, next: String!, note: String): String!
    """Admin: refund whole order (admin)."""
    adminRefundOrder(orderId: String!, amount: Int, reason: String): String!
    """Admin-only — issue a new MCP token. Secret is returned ONCE in the response."""
    mcpIssueToken(name: String!, scopes: [String!]!, ttlDays: Int): String!
    """Admin-only — revoke an MCP token by id."""
    mcpRevokeToken(id: String!): String!
}


