input InSection {
    id: String
    type: Int!
    page: String!
    content: [InItem]
    slots: [Int]
    overlay: Boolean
    overlayAnchor: String
    """Cross-cutting "transparent background" flag — clears the section's default bg chain."""
    transparent: Boolean
    """Section-level opacity, 0..100 (%). 0 / absent = opaque; 100 = invisible."""
    transparentOpacity: Int
}

input InItem {
    name: String
    type: String!
    style: String!
    content: String!
    action: String
    actionStyle: String
    actionType: String
    actionContent: String
    animation: String
}

input InImage {
    id: String!
    name: String!
    location: String!
    created: String!
    type: String!
    size: Int!
    tags: [String]
}
input InLogo {
    content: String!
}
input InSeo {
    description: String
    keywords: [String]
    viewport: String
    charSet: String
    url: String
    image: String
    image_alt: String
    published_time: String
    modified_time: String
    author: String
    locale: String
}
