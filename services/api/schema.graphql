scalar JSON

# Phase C.3: per-feature query/mutation fields are now declared on each
# feature's `feature.manifest.ts → schemaSDL` and concatenated at boot
# via `composedSchemaSDL()`. The base `QueryMongo` / `MutationMongo`
# shells live here with a single `_empty` sentinel field — GraphQL SDL
# requires at least one field on a type, and every real field arrives
# via `extend type QueryMongo` / `extend type MutationMongo` from the
# manifests.
type QueryMongo {
    """Sentinel — see Phase C.3 note above. All real fields arrive via manifest `extend type QueryMongo` fragments."""
    _empty: String
}

type MutationMongo {
    """Sentinel — see Phase C.3 note on `QueryMongo._empty`."""
    _empty: String
}


type Query {
    sample: String!
    greeting: String!
    bar: String!
    mongo: QueryMongo!
}

type Mutation {
    mongo: MutationMongo!
}