name: e2e

# Pre-merge gate only — runs on PRs into master and on the master branch
# itself. `develop` is the long-lived integration branch and gets noisy
# pushes; we don't want a CI run on every WIP commit. Open a PR to master
# when the branch is ready for the e2e gate.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install deps
        # Match `ci.yml`'s install incantation. `npm ci` is strict and
        # trips on the antd v5↔v6 peer-dep chain (`@ant-design/compatible`
        # pins to antd v5; we're on v6). `--legacy-peer-deps` is how we
        # install locally and how `test-and-typecheck` installs in CI.
        # `--ignore-scripts` skips the bcrypt native-compile that doesn't
        # work on the GHA image without extra packages — Playwright doesn't
        # need bcrypt at install time, and the per-worker servers spawn
        # bcrypt-light paths via E2E_RUN.
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke spec (CV bundle round-trip)
        # PR gate is `tests/e2e/smoke/cv-bundle-chain.spec.ts` only — not
        # the full 4-shard e2e suite. The smoke spec exercises the same
        # critical paths (admin login, bundle import, public render, edit
        # round-trip, footer/translation flip) but in one serial run, so
        # one job replaces what used to be four matrix shards. We do NOT
        # set `PLAYWRIGHT_E2E_REUSE_DEV`: the per-worker server fixture
        # in `tests/e2e/fixtures/server.ts` spawns its own `next dev` when
        # the env var is unset, which is the CI shape.
        run: npx playwright test tests/e2e/smoke/ --reporter=list
        env:
          CI: '1'
          E2E_SMOKE_ENABLED: '1'

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: |
            playwright-report/
            test-results/
          retention-days: 7
