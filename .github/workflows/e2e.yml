name: e2e

# Wave 3 F8-e2e: re-enabled PR + master push triggers. The smoke job
# below runs `tests/e2e/smoke/cv-bundle-chain.spec.ts` only — the
# heavier MCP full-lifecycle spec lives at tests/e2e/mcp/ and is
# guarded with a `process.platform === 'win32'` skip so local dev
# stays green. A separate manual run via workflow_dispatch can target
# the broader suite when needed.
#
# Was manual-only since mcp-rollout #10 — flakes during the MCP
# rollout consumed more attention than they caught. The suite has
# been stabilised since (see tests/e2e/mcp/full-site-lifecycle.spec.ts
# header).
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install deps
        # Match `ci.yml`'s install incantation. `npm ci` is strict and
        # trips on the antd v5↔v6 peer-dep chain (`@ant-design/compatible`
        # pins to antd v5; we're on v6). `--legacy-peer-deps` is how we
        # install locally and how `test-and-typecheck` installs in CI.
        # `--ignore-scripts` skips the bcrypt native-compile that doesn't
        # work on the GHA image without extra packages — Playwright doesn't
        # need bcrypt at install time, and the per-worker servers spawn
        # bcrypt-light paths via E2E_RUN.
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build app for e2e (prod bundle)
        # Smoke runs against `next start` (prod), not `next dev`, to mirror
        # how `npm start` serves traffic in production. `tools/e2e-build.js`
        # spins up its own mongo + standalone-graphql to satisfy the build's
        # static-paths queries, then writes the prod bundle to
        # `ui/client/.next-e2e/`. Per-worker servers (set up by
        # tests/e2e/fixtures/server.ts under `PLAYWRIGHT_E2E_PROD=1`)
        # `next start` against that shared directory — read-only, so N
        # workers + 1 build is safe.
        run: npm run e2e:full:build

      - name: Run smoke spec (CV bundle round-trip, prod mode)
        # PR gate is `tests/e2e/smoke/cv-bundle-chain.spec.ts` only.
        # `PLAYWRIGHT_E2E_PROD=1` flips server.ts to `next start` against
        # the prebuilt `.next-e2e/`, eliminating the dev-mode flakes
        # (cold-compile races, Turbopack vs webpack churn, drawer-DOM
        # detachment from hot-reload). Mirrors production behaviour
        # rather than dev. We do NOT set `PLAYWRIGHT_E2E_REUSE_DEV`:
        # that's the local iterate-on-one-spec workflow.
        run: npx playwright test tests/e2e/smoke/ --reporter=list
        env:
          CI: '1'
          E2E_SMOKE_ENABLED: '1'
          PLAYWRIGHT_E2E_PROD: '1'

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: |
            playwright-report/
            test-results/
          retention-days: 7
