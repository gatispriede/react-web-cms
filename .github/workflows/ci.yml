name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  # Nightly trigger drives the visual-regression job below — too slow +
  # too noisy (until baselines stabilise) to run on every PR.
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC nightly
  # Adds a "Run workflow" button in the Actions tab for manual re-runs.
  workflow_dispatch:

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        # `--legacy-peer-deps` matches how we install locally (antd / react peer dep chain);
        # `--ignore-scripts` skips the bcrypt/native-compile step that doesn't work
        # on the CI image by default. Tests mock bcrypt-heavy paths.
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Typecheck (frontend)
        run: npx tsc --noEmit -p ui/client/tsconfig.json

      - name: Typecheck (tests)
        # Tests live behind a separate tsconfig because vitest is a devDep
        # and the production Docker image (NODE_ENV=production) doesn't
        # install it — `next build`'s typecheck would otherwise fail to
        # resolve `vitest/globals`.
        run: npx tsc --noEmit -p tsconfig.test.json

      - name: Pre-warm mongodb-memory-server binary
        # ~30 test files call `MongoMemoryServer.create()` and vitest fans
        # them out in parallel. On a cold CI cache, multiple workers race
        # on the same partial-download rename — one wins, the others ENOENT
        # (see services/features/Inventory/InventoryService.test.ts hook
        # timeout). Downloading once here populates `~/.cache/mongodb-binaries/`
        # so every worker hits the cache.
        run: node tools/scripts/prewarm-mongo-binary.mjs

      - name: Tests
        run: npm test -- --reporter=dot

  # Visual regression — opt-in via schedule + workflow_dispatch only.
  # Skipped on PR runs (per-PR feedback loop) and on master pushes
  # (Q4-cap roadmap item — no baselines committed yet, so every run
  # fails loudly until baselines land). Re-add `(github.event_name ==
  # 'push' && github.ref == 'refs/heads/master')` once the initial
  # baselines are captured + committed via the Q4-cap workflow.
  # See docs/runbooks/visual-regressions.md.
  visual:
    name: Visual regression (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual project
        # `--shard=N/4` lets Playwright distribute its test list across four
        # parallel runners. The shard label in the matrix above is shown
        # on the Actions tab so a failure tells you which slice to rerun.
        run: npx playwright test --project=visual --shard=${{ matrix.shard }}/4

      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

  # Deploy fans out to every droplet in the matrix in parallel. Each tenant
  # has its own DEPLOY_HOST_n + DEPLOY_ENV_FILE_n secret pair plus a per-
  # tenant SMOKE_URL. fail-fast is off so one tenant's flake doesn't cancel
  # the others — they're independent deploy targets, not a pipeline.
  #
  # Adding a new droplet: provision DEPLOY_HOST_n / DEPLOY_ENV_FILE_n
  # secrets in GitHub, then append a matrix entry below with the matching
  # name / smoke URL. The shared DEPLOY_SSH_KEY is reused across tenants.

  deploy:
    name: Deploy to ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    needs: test-and-typecheck
    # Only deploy on direct pushes to master, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # Holds the appleboy/ssh-action command_timeout (30m) plus the
    # workflow setup/teardown around it.
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: funisimo.pro
            host_secret: DEPLOY_HOST_1
            env_secret: DEPLOY_ENV_FILE_1
            smoke_url: https://funisimo.pro/
            seamless: false
          - name: skyclimber.pro
            host_secret: DEPLOY_HOST_2
            env_secret: DEPLOY_ENV_FILE_2
            smoke_url: https://skyclimber.pro/
            # Per-target seamless (blue/green) opt-in. Skyclimber runs
            # the P4 path (`tools/blue-green-deploy.sh`) so the `app`
            # container flip is atomic via Caddy's ACTIVE_UPSTREAM swap.
            # Funisimo stays on the legacy single-instance path until
            # the operator chooses to flip it. Per-target flag (rather
            # than a repo-wide `vars.SEAMLESS_DEPLOY`) avoids the
            # secret-edit constraint — the matrix entry is in version
            # control, no GitHub Settings round-trip.
            #
            # PRECONDITION: the droplet must have `app-blue` +
            # `app-green` containers from the `seamless` compose
            # profile. Bootstrap once: `docker compose --profile
            # seamless -p cms -f infra/compose.yaml --env-file .env
            # up -d`. See docs/runbooks/seamless-deployment.md.
            seamless: true
    env:
      DEPLOY_ENV_FILE: ${{ secrets[matrix.target.env_secret] }}
      SMOKE_URL: ${{ matrix.target.smoke_url }}
      SEAMLESS: ${{ matrix.target.seamless }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[matrix.target.host_secret] }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_ENV_FILE,SMOKE_URL,SEAMLESS
          script_stop: true
          # Default appleboy/ssh-action command_timeout is 10m, which fires
          # before the inner app-healthy loop on cold deploys (image pull +
          # `next build` regularly take 6-8m alone). Bumped to 30m so the
          # SSH session outlasts the inner timeouts; the GHA job timeout
          # (timeout-minutes: 30 above) is the real upper bound.
          command_timeout: 30m
          script: |
            set -euo pipefail

            REPO_URL="https://github.com/${{ github.repository }}.git"
            APP_DIR="/opt/cms"
            BRANCH="master"

            # Bootstrap steps below are idempotent — no-ops on subsequent deploys.

            if ! command -v git >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
              echo "==> Installing base packages"
              apt-get update -y
              apt-get install -y git curl ca-certificates
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "==> Installing Docker"
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi
            if ! docker compose version >/dev/null 2>&1; then
              apt-get update -y
              apt-get install -y docker-compose-plugin
            fi

            # fail2ban protects sshd from the constant scanner flood that
            # otherwise saturates MaxStartups and blocks legit SSH logins.
            if ! command -v fail2ban-client >/dev/null 2>&1; then
              echo "==> Installing fail2ban"
              apt-get update -y
              apt-get install -y fail2ban
              systemctl enable --now fail2ban
            fi

            # The pre-Caddy architecture installed nginx on the host to
            # reverse-proxy 80/443 → 127.0.0.1:3080. That's incompatible
            # with the `caddy` container which expects to own 80/443
            # itself. If nginx.service is present it silently wins the
            # port binding and every request returns `nginx` 502s.
            if systemctl list-unit-files 2>/dev/null | grep -q '^nginx\.service'; then
              echo "==> Disabling legacy host nginx (Caddy owns 80/443 now)"
              systemctl stop nginx 2>/dev/null || true
              systemctl disable nginx 2>/dev/null || true
              systemctl mask nginx 2>/dev/null || true
            fi

            # Raise sshd's unauth queue so scanner flood doesn't evict
            # GHA's handshake. Default (10:30:100) gets saturated on an
            # exposed droplet within ~15 min of boot.
            if ! grep -q '^MaxStartups 100:30:200' /etc/ssh/sshd_config; then
              echo "==> Hardening sshd against MaxStartups eviction"
              sed -i 's|^#*MaxStartups.*|MaxStartups 100:30:200|' /etc/ssh/sshd_config
              sed -i 's|^#*LoginGraceTime.*|LoginGraceTime 60|' /etc/ssh/sshd_config
              # reload (not restart) — keeps the current session alive
              systemctl reload ssh 2>/dev/null || systemctl reload sshd 2>/dev/null || true
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> Cloning repo to $APP_DIR"
              mkdir -p "$(dirname "$APP_DIR")"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            echo "==> Pulling latest code"
            git fetch origin "$BRANCH"
            # reset --hard leaves gitignored paths alone, so uploads/* survives.
            git reset --hard "origin/$BRANCH"

            # Bind-mounted in compose.yaml; ensure they exist so docker doesn't
            # auto-create them with surprising ownership.
            mkdir -p uploads/images uploads/bundles uploads/design-v2

            # Inquiry-form SMTP secrets — bind-mounted into `app` via
            # compose.yaml's `secrets:` block. Each file holds one
            # credential; `*_FILE=/run/secrets/<name>` env vars in the
            # container point at them. Bind-mount fails fast if the
            # source path is missing, so we materialise empty
            # placeholders here. The operator overwrites each file on
            # the droplet (`echo -n '...' > /opt/cms/secrets/smtp_pass`)
            # without redeploying. If a credential file stays empty
            # the inquiry mailer falls through to a clean 502 with
            # "SMTP not configured" — graceful degradation, no crash.
            mkdir -p secrets
            chmod 700 secrets
            for s in smtp_host smtp_port smtp_user smtp_pass mail_from; do
              if [ ! -f "secrets/$s" ]; then
                : > "secrets/$s"
                chmod 600 "secrets/$s"
              fi
            done

            # If DEPLOY_ENV_FILE is set, (re)write .env from it. If it's empty
            # (e.g. the original droplet already has .env on disk), leave the
            # existing file alone — but fail loudly if there's nothing at all.
            if [ -n "${DEPLOY_ENV_FILE:-}" ]; then
              umask 077
              printf '%s\n' "$DEPLOY_ENV_FILE" > .env
            elif [ ! -f .env ]; then
              echo "No DEPLOY_ENV_FILE secret and no existing .env on disk; aborting" >&2
              exit 1
            fi

            # Pre-refactor deploys ran compose from /opt/cms/ so the
            # default project name was `cms`. Post-refactor we run from
            # /opt/cms/infra/, which would default to `infra`. Pin `-p cms`
            # everywhere so compose adopts the existing containers instead
            # of colliding on their globally-unique `container_name:`.
            #
            # One-time reconciliation: if any of our containers still
            # carry a mismatched compose-project label (from a historic
            # `docker run` or a plain compose call without -p), remove
            # them so the next `up -d` can re-create them under the
            # correct project. Named volumes (caddy_data for Let's
            # Encrypt, and the bind-mounted mongo_data / uploads) survive
            # container removal.
            for c in mongodb server front caddy; do
              if ! docker inspect "$c" >/dev/null 2>&1; then
                continue   # container doesn't exist, nothing to reconcile
              fi
              proj=$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project"}}' "$c" 2>/dev/null || echo "")
              if [ "$proj" != "cms" ]; then
                echo "==> Evicting stale container '$c' (project='$proj', expected 'cms')"
                docker rm -f "$c" >/dev/null 2>&1 || true
              fi
            done

            echo "==> Bringing up stack (mongo + server + caddy if not already running)"
            # First pass: start everything that's not running (no build).
            # Covers the case where nginx was just evicted and Caddy has
            # never claimed :80/:443, or mongo/server died since last deploy.
            # Compose is a no-op for services already healthy.
            export DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1
            docker compose -p cms -f infra/compose.yaml --env-file .env up -d --no-build mongodb server caddy || true

            # Always rebuild `server`. The pre-fix workflow only rebuilt
            # `app` (`--no-deps app`), leaving the `server` container
            # pinned to whatever image was current the *last* time it was
            # manually rebuilt — months-old standalone GraphQL builds
            # ended up live in production that way. A dirty-SHA check
            # to skip the rebuild on pure-frontend commits was attempted
            # twice and silently killed the deploy script both times
            # (the "Computing dirty-server diff" echo printed, then
            # exit 1 with no further log line — even with set +eu and
            # pre-validated SHAs). BuildKit layer cache already makes
            # a no-op `up --build server` ~5s, so the optimization
            # wasn't worth the failure mode. Removed.
            CUR_SHA=$(git rev-parse HEAD)
            echo "==> Rebuilding server (cur=$CUR_SHA)"
            docker compose -p cms -f infra/compose.yaml --env-file .env up --no-deps --build -d server
            echo "==> Waiting for server to report healthy"
            for i in $(seq 1 24); do
              status=$(docker inspect --format '{{.State.Health.Status}}' server 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "    server healthy after ${i} checks"
                break
              fi
              if [ "$i" = "24" ]; then
                echo "!! server failed to become healthy within 2 minutes" >&2
                docker compose -p cms -f infra/compose.yaml --env-file .env logs --tail=200 server >&2 || true
                exit 1
              fi
              sleep 5
            done

            # Decide deploy mode without || or case constructs.
            # appleboy/ssh-action sends the script as one string to
            # bash -c. Some bash versions on the droplets choke on
            # case statements with ;; inside that string (line 327 /
            # 350 syntax error near unexpected token ; on 2026-05-04).
            # Plain sequential ifs are the safe path.
            DEPLOY_MODE=legacy
            if [ "${SEAMLESS:-}" = "true" ]; then DEPLOY_MODE=seamless; fi
            if [ "${SEAMLESS:-}" = "1" ]; then DEPLOY_MODE=seamless; fi
            echo "==> Deploy mode: $DEPLOY_MODE"

            if [ "$DEPLOY_MODE" = "seamless" ]; then
              echo "==> Seamless (blue/green) app deploy"
              # P4 path: the script identifies which of `app-blue` /
              # `app-green` is idle, builds + starts the new image
              # there, health-checks it, verifies its `.git-sha`
              # matches TARGET_SHA, then atomically flips Caddy's
              # `ACTIVE_UPSTREAM` and reloads. Active instance keeps
              # serving live traffic the whole time — no 502 window.
              # See docs/runbooks/seamless-deployment.md.

              # Auto-bootstrap if app-blue / app-green don't exist yet.
              # CRITICAL: this is the first-time transition from the
              # legacy single-instance path (front container, Caddy
              # pointing at `app:80`) to the seamless path (blue/green,
              # Caddy pointing at app-blue:80 or app-green:80). It must
              # NOT cause public downtime — `front` keeps serving live
              # traffic the whole time. Two specific bugs the previous
              # version hit on skyclimber 2026-05-04:
              #   1. `docker compose ... up -d --build` without service
              #      names recreated `front` AND `caddy` along with
              #      creating blue/green. Front went down for the cold
              #      next-build window.
              #   2. Pre-seeding `ACTIVE_UPSTREAM=app-blue:80` in `.env`
              #      pointed Caddy at blue while blue was still mid-cold-
              #      build → "Shipping a fresh version" maintenance page
              #      for the duration of the build.
              # Fix: build ONLY the two new slots (explicit service names),
              # leave the legacy stack untouched, defer the Caddy flip
              # until blue is healthy + verified.
              if ! docker inspect app-blue >/dev/null 2>&1 || ! docker inspect app-green >/dev/null 2>&1; then
                echo "==> First-run seamless bootstrap (app-blue + app-green missing)"
                echo "    legacy front container keeps serving until app-blue is healthy"

                # Build + start ONLY the new slots. No `--build` cascade,
                # no implicit recreate of front/caddy. Both blue + green
                # come up in parallel so we eat the cold-build cost once.
                docker compose --profile seamless -p cms -f infra/compose.yaml --env-file .env up -d --build app-blue app-green

                # Wait for BOTH slots — blue to be the new active, green
                # to be ready for the next deploy. 10-min ceiling matches
                # the legacy front-container poll.
                for slot in app-blue app-green; do
                  echo "==> Waiting for $slot to report healthy"
                  for i in $(seq 1 120); do
                    status=$(docker inspect --format '{{.State.Health.Status}}' "$slot" 2>/dev/null || echo starting)
                    if [ "$status" = "healthy" ]; then
                      echo "    $slot healthy after ${i} checks"
                      break
                    fi
                    if [ "$i" = "120" ]; then
                      echo "!! $slot failed to become healthy within 10 minutes" >&2
                      docker logs --tail=200 "$slot" >&2 || true
                      exit 1
                    fi
                    sleep 5
                  done
                done

                # NOW flip Caddy to blue. blue is healthy; this is the
                # only public-facing change in the bootstrap. Atomic
                # Caddy reload (graceful — finishes in-flight requests
                # on the legacy upstream first).
                if grep -q '^ACTIVE_UPSTREAM=' .env 2>/dev/null; then
                  sed -i 's|^ACTIVE_UPSTREAM=.*|ACTIVE_UPSTREAM=app-blue:80|' .env
                else
                  echo 'ACTIVE_UPSTREAM=app-blue:80' >> .env
                fi
                echo "    flipped ACTIVE_UPSTREAM → app-blue:80"
                docker exec caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || \
                  docker compose -p cms -f infra/compose.yaml --env-file .env restart caddy
                echo "==> Bootstrap complete; legacy front retired, blue is now serving traffic"
                # Optional cleanup: legacy front container is no longer
                # in the routing path. Leave it running for now — blue/
                # green-deploy.sh handles its own flips from here on,
                # and front can be `docker rm -f`'d in a follow-up
                # housekeeping task once the seamless path is stable.
              fi
              # 600s ceiling matches the legacy front-container health
              # loop. Cold `next build` inside the freshly-recreated
              # slot takes 5-8 min on the droplet's CPU budget; the
              # previous 60s default aborted flips that would have
              # eventually succeeded.
              TARGET_SHA="$CUR_SHA" \
                DEPLOY_HEALTH_TIMEOUT="${DEPLOY_HEALTH_TIMEOUT:-600}" \
                DRAIN_SECONDS="${DRAIN_SECONDS:-30}" \
                bash tools/blue-green-deploy.sh
              # blue-green script exits 0 on a successful flip; its own
              # health check covers the inactive→active transition. We
              # still run the public smoke check below to verify Caddy
              # is honouring the new upstream from the outside.
              echo "==> Seamless flip complete; falling through to public smoke check"
            fi

            if [ "$DEPLOY_MODE" = "legacy" ]; then
              echo "==> Rebuilding and restarting app (legacy stop-the-world; brief 502 window)"
              # `--no-deps app` leaves mongodb / server / caddy running
              # untouched, so TLS doesn't blip and the DB connection pool
              # survives. Caddy keeps serving the previous container's
              # port 80 until the new `app` is healthy, then Docker
              # swaps them. BuildKit picks up layer cache from the prior
              # build automatically on the same host.
              docker compose -p cms -f infra/compose.yaml --env-file .env up --no-deps --build -d app
            fi

            # Skip the `front` health loop when seamless ran — the
            # blue-green script already health-checked its inactive
            # instance + verified the SHA before flipping Caddy, and
            # `front` doesn't exist in the seamless compose profile
            # anyway (replaced by app-blue + app-green). The public
            # smoke check below covers the post-flip Caddy path.
            if [ "$DEPLOY_MODE" = "seamless" ]; then
              echo '==> Skipping legacy front-container health loop (seamless path; already health-checked pre-flip)'
            else
            echo "==> Waiting for app to report healthy"
            # Poll the compose healthcheck (defined in compose.yaml) for
            # up to 10 minutes before giving up. Cold builds (no
            # BuildKit cache, fresh `next build` SSG pass) routinely run
            # 6-8 min on the droplet's small CPU budget; the previous
            # 3-min cap was tripping legitimate deploys. The
            # appleboy/ssh-action `command_timeout: 30m` set above
            # gives this loop room to run plus the server-rebuild loop
            # plus image pulls.
            for i in $(seq 1 120); do
              status=$(docker inspect --format '{{.State.Health.Status}}' front 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "    app healthy after ${i} checks"
                break
              fi
              if [ "$i" = "120" ]; then
                echo "!! app failed to become healthy within 10 minutes" >&2
                docker compose -p cms -f infra/compose.yaml --env-file .env logs --tail=200 app >&2 || true
                exit 1
              fi
              sleep 5
            done
            fi

            echo "==> Smoke check: HTTPS via Caddy returns 200"
            # Hit Caddy via 127.0.0.1 + --resolve so SNI stays correct
            # (= the public domain) but the TCP connection goes to the
            # local docker-proxy instead of round-tripping through the
            # droplet's own public IP. DigitalOcean's NAT doesn't always
            # hairpin properly — `curl https://skyclimber.pro/` from the
            # droplet itself returns a TLS internal-error alert even
            # while external clients get clean 200s. The --resolve
            # path tests the same Caddy → app upstream chain that real
            # public traffic uses, just without the cloud round-trip.
            SMOKE_URL="${SMOKE_URL:-https://funisimo.pro/}"
            SMOKE_HOST=$(echo "$SMOKE_URL" | sed -E 's|^https?://([^/]+).*|\1|')
            smoke_code=$(curl -sSL --resolve "${SMOKE_HOST}:443:127.0.0.1" -o /dev/null -w "%{http_code}" --max-time 20 "$SMOKE_URL" || echo "000")
            if [ "$smoke_code" != "200" ]; then
              echo "!! Smoke check failed: $SMOKE_URL returned $smoke_code" >&2
              # Diagnostics: localhost (no SNI), the same --resolve probe
              # again with -I for headers, and the last 20 app log lines.
              curl -sS -o /dev/null -w "localhost http_code: %{http_code}\n" --max-time 10 http://localhost/ >&2 || true
              curl -sSIL --resolve "${SMOKE_HOST}:443:127.0.0.1" --max-time 10 "$SMOKE_URL" 2>&1 | head -1 >&2 || true
              docker compose -p cms -f infra/compose.yaml --env-file .env logs --tail=20 app >&2 || true
              exit 1
            fi

            docker compose -p cms -f infra/compose.yaml --env-file .env ps
            echo "==> Deploy complete"
