name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        # `--legacy-peer-deps` matches how we install locally (antd / react peer dep chain);
        # `--ignore-scripts` skips the bcrypt/native-compile step that doesn't work
        # on the CI image by default. Tests mock bcrypt-heavy paths.
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Typecheck (frontend)
        run: npx tsc --noEmit -p src/frontend/tsconfig.json

      - name: Tests
        run: npm test -- --reporter=dot

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: test-and-typecheck
    # Only deploy on direct pushes to master, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.101.220.131
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/cms

            echo "==> Pulling latest code"
            git pull origin master

            echo "==> Rebuilding and restarting containers"
            docker compose -f compose.yaml -f compose.prod.yaml up --build -d

            echo "==> Waiting for containers to become healthy"
            sleep 10
            docker compose -f compose.yaml -f compose.prod.yaml ps

            echo "==> Deploy complete"
