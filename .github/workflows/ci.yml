name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  # Nightly schedule trigger removed 2026-05-08 — only `visual:` was
  # opting into it, and operator dropped visual from the pipeline (run
  # manually when needed). Re-add the cron block here if a regular
  # cadence ever returns.
  #
  # "Run workflow" button in the Actions tab for manual re-runs.
  # The optional `target` input scopes the deploy job to ONE droplet —
  # useful for staging a risky change on funisimo first before rolling
  # it to skyclimber. Empty (the default) deploys to every droplet in
  # the matrix as on a normal push.
  workflow_dispatch:
    inputs:
      target:
        description: 'Single droplet to deploy (empty = all). Match the matrix `name`.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - funisimo.pro
          - skyclimber.pro

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        # `--legacy-peer-deps` matches how we install locally (antd / react peer dep chain);
        # `--ignore-scripts` skips the bcrypt/native-compile step that doesn't work
        # on the CI image by default. Tests mock bcrypt-heavy paths.
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Typecheck (frontend)
        run: npx tsc --noEmit -p ui/client/tsconfig.json

      - name: Typecheck (tests)
        # Tests live behind a separate tsconfig because vitest is a devDep
        # and the production Docker image (NODE_ENV=production) doesn't
        # install it — `next build`'s typecheck would otherwise fail to
        # resolve `vitest/globals`.
        run: npx tsc --noEmit -p tsconfig.test.json

      - name: Pre-warm mongodb-memory-server binary
        # ~30 test files call `MongoMemoryServer.create()` and vitest fans
        # them out in parallel. On a cold CI cache, multiple workers race
        # on the same partial-download rename — one wins, the others ENOENT
        # (see services/features/Inventory/InventoryService.test.ts hook
        # timeout). Downloading once here populates `~/.cache/mongodb-binaries/`
        # so every worker hits the cache.
        run: node tools/scripts/prewarm-mongo-binary.mjs

      - name: Tests
        run: npm test -- --reporter=dot

      - name: data-testid coverage (changed files)
        # Universal requirement #4 — every interactive surface in new
        # or modified `.tsx` carries `data-testid`. Diff mode only (no
        # big-bang sweep of the 700+ legacy gaps); the script reads
        # `tools/scripts/.testid-coverage-allow` for opt-outs.
        # Requires `origin/master` ref — actions/checkout@v4 fetches
        # depth=1 by default, so refresh it here.
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin master
          npm run testid-coverage

  # ----------------------------------------------------------------
  # W8d performance gates — bundle-size + Lighthouse. PR-only because
  # both jobs need a full `next build` (~3-5 min on the GHA runner) and
  # push-to-master already runs the deploy path on the droplet. Both
  # `continue-on-error: true` for now — configs are bedding in, the
  # signal lives in the PR comment + log artefact, not in a red X.
  # Flip to required after one calm week of accurate budgets.

  size-limit:
    name: size-limit (bundle budgets)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund
      - name: Build (frontend only)
        run: npm run build
        env:
          # Skip the mongo-required postbuild step (`next-sitemap` reads
          # data sources). Bundle size doesn't depend on it.
          NEXT_PUBLIC_SKIP_POSTBUILD: '1'
      - name: Run size-limit
        run: npx size-limit

  lhci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund
      - name: Install Chrome
        # LHCI needs a real Chromium to drive Lighthouse. `puppeteer`
        # ships one but we already build w/o native scripts here, so the
        # GHA-provided Chrome on the ubuntu image is the cleanest path.
        run: |
          if ! command -v google-chrome >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y google-chrome-stable || true
          fi
      - name: Build
        run: npm run build
      - name: Run Lighthouse CI
        run: npx lhci autorun --config=lighthouserc.cjs
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

  # ----------------------------------------------------------------
  # W8a — Pa11y accessibility batch. Runs `pa11y-ci` over the route list in
  # `.pa11yci.json` against a built+started server. PR-only;
  # `continue-on-error: true` for the bedding-in window so the operator can
  # see the baseline before we flip it to a required gate (per spec). Flip
  # the flag once the report stabilises at zero serious errors across the
  # seven listed routes.
  pa11y:
    name: pa11y (WCAG 2.2 AA batch)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund
      - name: Install Chrome
        # pa11y drives a headless Chromium under the hood (puppeteer-core).
        # GHA's ubuntu image already ships google-chrome-stable; install
        # defensively in case the base image rotates.
        run: |
          if ! command -v google-chrome >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y google-chrome-stable || true
          fi
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SKIP_POSTBUILD: '1'
      - name: Start server (background)
        run: |
          # `npm run start` boots Next on port 80 by default which needs
          # root; pin to 3000 to match `.pa11yci.json` and lhci.
          (cross-env NODE_ENV=production npx next start -p 3000 ui/client &) >/tmp/next.log 2>&1
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3000/ >/dev/null 2>&1; then
              echo "server up after ${i} * 2 s"
              break
            fi
            sleep 2
          done
      - name: Run Pa11y batch
        run: npm run pa11y
        env:
          BASE_URL: http://localhost:3000
      - name: Upload pa11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-report
          path: var/pa11y-report.json
          if-no-files-found: ignore

  # Visual regression + e2e jobs removed 2026-05-08 — operator runs
  # Playwright tests locally only. To re-introduce, see git history
  # for `visual:` here and the deleted `.github/workflows/e2e.yml`.

  # ----------------------------------------------------------------
  # GHCR push — Wave 1 Terraform/Kamal migration. Builds the multi-stage
  # `infra/AppDockerfile` once and pushes `ghcr.io/gatispriede/cms:<sha>`
  # so droplets can `docker pull` instead of running `next build` at
  # container start. Cold-deploy budget: ~6-8 min → ~30 s.
  #
  # Runs on push to master (alongside the legacy ssh deploy below — both
  # paths are kept active during the cutover window so a regression on
  # the Kamal path leaves the legacy deploy as a working fallback).
  # Once funisimo runs stable on Kamal for ≥ 1 release cycle, the legacy
  # `deploy:` job below retires.
  ghcr-push:
    name: Build + push image to GHCR
    runs-on: ubuntu-latest
    needs: test-and-typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (sha + latest tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/AppDockerfile
          push: true
          tags: |
            ghcr.io/gatispriede/cms:${{ github.sha }}
            ghcr.io/gatispriede/cms:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------
  # Kamal deploy to funisimo.pro — runs after `ghcr-push:` lands the new
  # image on GHCR.
  #
  # Uses the actual `kamal deploy` CLI (not bash-over-SSH) so the
  # deployment goes through Kamal's container lifecycle: pull the new
  # image, boot the new container alongside the old, healthcheck, drop
  # old. Container env comes from `/opt/cms/.env` on the droplet (see
  # `config/deploy.yml` `options.env-file`).
  #
  # Post-deploy hook (`.kamal/hooks/post-deploy`) attaches the
  # `cms_front-end` network (kamal v2 limit: `options.network` takes
  # one) and smokes `https://funisimo.pro/api/health` end-to-end.
  #
  # Replaces the legacy `Deploy to funisimo.pro` matrix entry (which is
  # `auto: false` since the 2026-05-08 cutover). Skyclimber stays on
  # the legacy `deploy:` matrix until it has its own DO API key + a
  # parallel `cms-web` cutover.
  deploy-funisimo:
    name: Kamal deploy → funisimo.pro
    runs-on: ubuntu-latest
    needs: [test-and-typecheck, ghcr-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        run: gem install kamal -v '~> 2.0' --no-document

      - name: Mask SSH key identifiers in workflow logs
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Pre-register the SSH key's public half + fingerprint + comment
          # as GitHub-Actions masks. Any subsequent log line that contains
          # these values (`ssh-add`'s `Identity added: ... (comment)` line,
          # or any third-party step that echoes the public key) is rendered
          # as `***`. Without this, the comment (operator machine name like
          # `User@Funisimo-pc`) leaks into the public-repo Actions logs.
          #
          # `webfactory/ssh-agent`'s `log-public-key: false` flag (below)
          # also suppresses its own pubkey dump, but `ssh-add` itself
          # writes to stderr and `log-public-key` doesn't catch that —
          # ::add-mask:: does.
          TMP=$(mktemp)
          umask 077
          printf '%s\n' "$SSH_KEY" > "$TMP"
          PUBKEY=$(ssh-keygen -y -f "$TMP" 2>/dev/null || true)
          FP=$(ssh-keygen -lf "$TMP" 2>/dev/null | awk '{print $2}')
          COMMENT=$(printf '%s' "$PUBKEY" | awk '{print $NF}')
          rm -f "$TMP"
          [ -n "$PUBKEY" ]  && echo "::add-mask::$PUBKEY"
          [ -n "$FP" ]      && echo "::add-mask::$FP"
          [ -n "$COMMENT" ] && echo "::add-mask::$COMMENT"
          # Empty echo so we don't accidentally surface anything via $?.
          echo "ssh key identifiers registered for masking"

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Suppress the action's default public-key + comment printout —
          # the comment embeds the operator's machine name (e.g.
          # `User@Funisimo-pc`) which is identifying info we don't want
          # in public CI logs. Auth still works; only the log line is
          # silenced. Belt-and-braces with the mask step above.
          log-public-key: false

      - name: Ensure `kamal` docker network exists on funisimo
        run: |
          # Kamal v2.11 hardcodes `--network kamal` in
          # `lib/kamal/commands/app.rb:21` — no deploy.yml override.
          # The network is auto-created by `kamal setup`, but we don't
          # run setup (it tries to boot kamal-proxy which we don't want).
          # Create the network manually here; idempotent.
          ssh -o StrictHostKeyChecking=accept-new root@funisimo.pro \
            "docker network inspect kamal >/dev/null 2>&1 || docker network create kamal"

      - name: Configure SSH for funisimo.pro
        run: |
          # Skip strict host-key checking for funisimo deploy targets.
          # Net::SSH 7.3 (kamal v2.11's runtime) parses ~/.ssh/config
          # for `StrictHostKeyChecking`. Auth still requires
          # DEPLOY_SSH_KEY — strict host-key verification on an
          # ephemeral GHA runner buys nothing extra.
          # Plain text config (no heredoc indentation traps).
          mkdir -p ~/.ssh
          {
            printf 'Host funisimo.pro 46.101.220.131 139.59.205.140\n'
            printf '    StrictHostKeyChecking no\n'
            printf '    UserKnownHostsFile /dev/null\n'
            printf '    LogLevel ERROR\n'
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          # Also pre-populate plain (non-hashed) known_hosts as fallback —
          # if Net::SSH's ~/.ssh/config parsing skips StrictHostKeyChecking,
          # plain entries match the hostname/IP keys directly.
          ssh-keyscan funisimo.pro 46.101.220.131 139.59.205.140 >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Kamal app boot
        env:
          # GHCR pull auth — workflow's GITHUB_TOKEN already has
          # packages:read once Actions access on the package is set
          # (operator did this 2026-05-08).
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `kamal app boot` (not `kamal deploy`) because kamal v2's
          # `deploy` always tries to set up kamal-proxy and there's no
          # skip flag. We don't run kamal-proxy (Caddy is the public
          # front). `app boot` is the proxy-agnostic primitive: pulls
          # image, stops old, starts new.
          # `--destination=funisimo` loads `config/deploy.funisimo.yml`
          # on top of `config/deploy.yml`, providing the funisimo-specific
          # hosts list. Skyclimber uses `--destination=skyclimber` in the
          # parallel `deploy-skyclimber:` job below.
          # `--version` pins to the master SHA already on GHCR via
          # the `ghcr-push:` job above.
          kamal app boot --destination=funisimo --version=${{ github.sha }}

      - name: Rotate to new container + public smoke
        run: |
          # Kamal v2 names the new container cms-web-<sha-full> (versioned).
          # Caddy's upstream is `cms-web:80` — needs to resolve to the
          # NEW container. Strategy: docker network alias `cms-web` on
          # both compose networks. Stop the prior cms-web* (versioned
          # or unversioned from manual cutover) so the alias releases.
          # Caddy's `lb_try_duration 30s` covers the brief gap.
          ssh root@funisimo.pro bash -s <<'REMOTE'
          set -e
          NEW=$(docker ps --filter "name=cms-web-" --format "{{.Names}}" | head -1)
          if [ -z "$NEW" ]; then
            echo "!! no kamal-booted cms-web-<sha> container found" >&2
            docker ps --format "{{.Names}}: {{.Status}}" >&2
            exit 1
          fi
          echo "new container: $NEW"

          # Stop + remove the unversioned `cms-web` (manual cutover from
          # 2026-05-08) and any prior versioned cms-web-* that aren't $NEW.
          for c in $(docker ps -a --filter "name=cms-web" --format "{{.Names}}"); do
            if [ "$c" != "$NEW" ]; then
              echo "stopping prior: $c"
              docker stop "$c" 2>/dev/null || true
              docker rm "$c" 2>/dev/null || true
            fi
          done

          # Attach $NEW to compose networks with alias `cms-web` so Caddy's
          # upstream and the legacy `mongo` / `mcp` / standalone-graphql
          # references all resolve.
          docker network connect cms_back-end "$NEW" --alias cms-web 2>/dev/null || true
          docker network connect cms_front-end "$NEW" --alias cms-web 2>/dev/null || true
          REMOTE

          # Public smoke from the runner.
          for i in 1 2 3 4 5 6 7 8; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 https://funisimo.pro/api/health || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "public smoke 200 after $((i*5))s"
              exit 0
            fi
            sleep 5
          done
          echo "!! public /api/health did not return 200 within 40s" >&2
          ssh root@funisimo.pro 'docker ps --format "{{.Names}}: {{.Status}}"; docker logs $(docker ps --filter "name=cms-web-" -q | head -1) --tail=30' >&2 || true
          exit 1

  # ----------------------------------------------------------------
  # Kamal deploy to skyclimber.pro — mirror of `deploy-funisimo:` with
  # skyclimber-specific hosts/IPs. Same `DEPLOY_SSH_KEY` (the same
  # public half is on both droplets' authorized_keys per operator
  # decision 2026-05-09: reuse).
  #
  # Skyclimber's legacy `Deploy to skyclimber.pro` matrix entry stays
  # `auto: false` from 2026-05-08 — kept as emergency fallback via
  # `workflow_dispatch --target=skyclimber.pro`.
  deploy-skyclimber:
    name: Kamal deploy → skyclimber.pro
    runs-on: ubuntu-latest
    needs: [test-and-typecheck, ghcr-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        run: gem install kamal -v '~> 2.0' --no-document

      - name: Mask SSH key identifiers in workflow logs
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Same mask logic as deploy-funisimo: register pubkey + fingerprint
          # + comment so subsequent `ssh-add` output shows `***`.
          TMP=$(mktemp)
          umask 077
          printf '%s\n' "$SSH_KEY" > "$TMP"
          PUBKEY=$(ssh-keygen -y -f "$TMP" 2>/dev/null || true)
          FP=$(ssh-keygen -lf "$TMP" 2>/dev/null | awk '{print $2}')
          COMMENT=$(printf '%s' "$PUBKEY" | awk '{print $NF}')
          rm -f "$TMP"
          [ -n "$PUBKEY" ]  && echo "::add-mask::$PUBKEY"
          [ -n "$FP" ]      && echo "::add-mask::$FP"
          [ -n "$COMMENT" ] && echo "::add-mask::$COMMENT"
          echo "ssh key identifiers registered for masking"

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
          log-public-key: false

      - name: Ensure `kamal` docker network exists on skyclimber
        run: |
          # Same hardcoded-network workaround as funisimo (see deploy-funisimo).
          ssh -o StrictHostKeyChecking=accept-new root@skyclimber.pro \
            "docker network inspect kamal >/dev/null 2>&1 || docker network create kamal"

      - name: Configure SSH for skyclimber.pro
        run: |
          # Skip strict host-key check — Net::SSH 7.3 honours ~/.ssh/config.
          # Skyclimber IPs: 138.68.115.204 (reserved, DNS apex points here)
          # + 165.245.212.249 (eth0).
          mkdir -p ~/.ssh
          {
            printf 'Host skyclimber.pro 138.68.115.204 165.245.212.249\n'
            printf '    StrictHostKeyChecking no\n'
            printf '    UserKnownHostsFile /dev/null\n'
            printf '    LogLevel ERROR\n'
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          ssh-keyscan skyclimber.pro 138.68.115.204 165.245.212.249 >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Kamal app boot
        env:
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `--destination=skyclimber` loads `config/deploy.skyclimber.yml`
          # on top of `config/deploy.yml`. Same image + builder + registry
          # + ssh user as funisimo; only `servers.web.hosts:` differs.
          kamal app boot --destination=skyclimber --version=${{ github.sha }}

      - name: Rotate to new container + public smoke
        run: |
          # Identical rotation logic to deploy-funisimo: stop prior
          # cms-web*, attach the new versioned container to cms_back-end
          # + cms_front-end with `--alias cms-web` so Caddy's upstream
          # resolves correctly. Caddy's `lb_try_duration 30s` covers
          # the brief gap during swap.
          ssh root@skyclimber.pro bash -s <<'REMOTE'
          set -e
          NEW=$(docker ps --filter "name=cms-web-" --format "{{.Names}}" | head -1)
          if [ -z "$NEW" ]; then
            echo "!! no kamal-booted cms-web-<sha> container found" >&2
            docker ps --format "{{.Names}}: {{.Status}}" >&2
            exit 1
          fi
          echo "new container: $NEW"

          # Stop + remove the unversioned `cms-web` (manual cutover from
          # 2026-05-09) and any prior versioned cms-web-* that aren't $NEW.
          for c in $(docker ps -a --filter "name=cms-web" --format "{{.Names}}"); do
            if [ "$c" != "$NEW" ]; then
              echo "stopping prior: $c"
              docker stop "$c" 2>/dev/null || true
              docker rm "$c" 2>/dev/null || true
            fi
          done

          docker network connect cms_back-end "$NEW" --alias cms-web 2>/dev/null || true
          docker network connect cms_front-end "$NEW" --alias cms-web 2>/dev/null || true
          REMOTE

          # Public smoke from the runner.
          for i in 1 2 3 4 5 6 7 8; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 https://skyclimber.pro/api/health || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "public smoke 200 after $((i*5))s"
              exit 0
            fi
            sleep 5
          done
          echo "!! public /api/health did not return 200 within 40s" >&2
          ssh root@skyclimber.pro 'docker ps --format "{{.Names}}: {{.Status}}"; docker logs $(docker ps --filter "name=cms-web-" -q | head -1) --tail=30' >&2 || true
          exit 1

  # ----------------------------------------------------------------
  # Legacy ssh+rsync deploy. Funisimo is `auto: false` since 2026-05-08
  # (Kamal owns it now via the `deploy-funisimo:` job above). Skyclimber
  # stays here until it gets its own DO API key + Kamal cutover.
  #
  # Deploy fans out to every droplet in the matrix in parallel. Each tenant
  # has its own DEPLOY_HOST_n + DEPLOY_ENV_FILE_n secret pair plus a per-
  # tenant SMOKE_URL. fail-fast is off so one tenant's flake doesn't cancel
  # the others — they're independent deploy targets, not a pipeline.
  #
  # Adding a new droplet: provision DEPLOY_HOST_n / DEPLOY_ENV_FILE_n
  # secrets in GitHub, then append a matrix entry below with the matching
  # name / smoke URL. The shared DEPLOY_SSH_KEY is reused across tenants.

  deploy:
    name: Deploy to ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    needs: test-and-typecheck
    # Run on:
    #   - push to master (only droplets with `auto: true` in the matrix)
    #   - workflow_dispatch (manual). The `target` input scopes to one
    #     droplet; empty input deploys to every droplet regardless of
    #     `auto`. Use this to roll a release to a paused droplet.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'workflow_dispatch'
    # Holds the appleboy/ssh-action command_timeout (45m) plus the
    # workflow setup/teardown around it. Bumped from 45 → 60 to cover
    # the longer DEPLOY_HEALTH_TIMEOUT (30 min) without the GHA job
    # killing ssh mid-deploy.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: funisimo.pro
            host_secret: DEPLOY_HOST_1
            env_secret: DEPLOY_ENV_FILE_1
            smoke_url: https://funisimo.pro/
            seamless: false
            # `auto: false` since 2026-05-08 — funisimo is now served by
            # the Kamal-managed `cms-web` container (see
            # `config/deploy.yml` + `docs/runbooks/kamal-deploy.md`).
            # The legacy ssh+rsync deploy still resolves here for
            # `workflow_dispatch --target=funisimo.pro` runs (emergency
            # fallback if Kamal needs backing out), but no longer fires
            # on push-to-master.
            auto: false
          - name: skyclimber.pro
            host_secret: DEPLOY_HOST_2
            env_secret: DEPLOY_ENV_FILE_2
            smoke_url: https://skyclimber.pro/
            # `auto: false` since 2026-05-08 (operator: "skip sky for
            # now"). Skyclimber's legacy build was timing out on cold
            # next-build at startup; while we sort that path out the
            # auto-deploy is paused. Manual via `workflow_dispatch
            # --target=skyclimber.pro` still resolves the legacy path.
            #
            # Re-enable when:
            #   - Skyclimber gets its own DO API key + Kamal cutover
            #     (preferred — same fast deploy as funisimo)
            #   - Or the legacy build issue is fixed
            auto: false
            # Per-target seamless (blue/green) opt-in. Skyclimber runs
            # the P4 path (`tools/blue-green-deploy.sh`) so the `app`
            # container flip is atomic via Caddy's ACTIVE_UPSTREAM swap.
            # Funisimo stays on the legacy single-instance path until
            # the operator chooses to flip it. Per-target flag (rather
            # than a repo-wide `vars.SEAMLESS_DEPLOY`) avoids the
            # secret-edit constraint — the matrix entry is in version
            # control, no GitHub Settings round-trip.
            #
            # PRECONDITION: the droplet must have `app-blue` +
            # `app-green` containers from the `seamless` compose
            # profile. Bootstrap once: `docker compose --profile
            # seamless -p cms -f infra/compose.yaml --env-file .env
            # up -d`. See docs/runbooks/seamless-deployment.md.
            seamless: true
    env:
      DEPLOY_ENV_FILE: ${{ secrets[matrix.target.env_secret] }}
      SMOKE_URL: ${{ matrix.target.smoke_url }}
      SEAMLESS: ${{ matrix.target.seamless }}

    steps:
      # Skip rules. Matrix can't be pre-filtered via expression (it's
      # statically evaluated), so the guard lives on the deploy step
      # itself; skipped jobs spin up briefly then no-op.
      #
      # On push to master: only droplets with `auto: true` deploy.
      # On workflow_dispatch:
      #   - empty `target` input: deploy every matrix entry (manual full
      #     fan-out — the override path for promoting to a paused droplet).
      #   - non-empty `target`: deploy only the matching entry.
      - name: Skip droplet
        if: |
          (github.event_name == 'push' && matrix.target.auto != true) ||
          (github.event_name == 'workflow_dispatch' && inputs.target != '' && inputs.target != matrix.target.name)
        run: |
          echo "skipping ${{ matrix.target.name }}"
          echo "  event=${{ github.event_name }}"
          echo "  matrix.auto=${{ matrix.target.auto }}"
          echo "  inputs.target='${{ inputs.target }}'"
          exit 0
      - name: Deploy via SSH
        if: |
          (github.event_name == 'push' && matrix.target.auto == true) ||
          (github.event_name == 'workflow_dispatch' && (inputs.target == '' || inputs.target == matrix.target.name))
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[matrix.target.host_secret] }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_ENV_FILE,SMOKE_URL,SEAMLESS
          # `script_stop: true` joins script lines with `&&`-style chaining,
          # which makes the action abort whenever ANY single line returns
          # non-zero — including bash `if` test commands that bash itself
          # correctly handles without aborting. Caused funisimo deploys
          # to die at `if [ "$DEPLOY_MODE" = "seamless" ]; then` once
          # DEPLOY_MODE was set to "legacy". Our inline `set -euo pipefail`
          # below is the right gate; it follows POSIX `set -e` semantics
          # and exempts test contexts.
          script_stop: false
          # Default appleboy/ssh-action command_timeout is 10m. Cold
          # deploys (image pull + `next build` on 1-vCPU droplet) can
          # cross 25-30 min when antd/rc-* re-transpile is needed, so
          # the inner DEPLOY_HEALTH_TIMEOUT is 1800s (30 min). Set the
          # SSH session timeout to 50m so it outlasts the inner loop.
          # The GHA job's `timeout-minutes: 60` above is the real cap.
          command_timeout: 50m
          script: |
            set -euo pipefail

            # SSH keepalive heartbeat. The appleboy/ssh-action session
            # drops when no bytes flow through the channel for too long;
            # long stretches inside `docker build` (single layer cache
            # restore, single `next build` SSG pass) can sit idle from
            # the SSH socket's perspective even though docker is busy.
            # A background loop printing every 20s guarantees the
            # connection never goes idle. EXIT trap cleans up so the
            # heartbeat doesn't outlive the main script.
            ( while sleep 20; do echo "    [heartbeat $(date +%H:%M:%S)]"; done ) &
            HEARTBEAT_PID=$!
            trap 'kill $HEARTBEAT_PID 2>/dev/null || true' EXIT

            REPO_URL="https://github.com/${{ github.repository }}.git"
            APP_DIR="/opt/cms"
            BRANCH="master"

            # Bootstrap steps below are idempotent — no-ops on subsequent deploys.

            if ! command -v git >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
              echo "==> Installing base packages"
              apt-get update -y
              apt-get install -y git curl ca-certificates
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "==> Installing Docker"
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi
            if ! docker compose version >/dev/null 2>&1; then
              apt-get update -y
              apt-get install -y docker-compose-plugin
            fi

            # fail2ban protects sshd from the constant scanner flood that
            # otherwise saturates MaxStartups and blocks legit SSH logins.
            if ! command -v fail2ban-client >/dev/null 2>&1; then
              echo "==> Installing fail2ban"
              apt-get update -y
              apt-get install -y fail2ban
              systemctl enable --now fail2ban
            fi

            # The pre-Caddy architecture installed nginx on the host to
            # reverse-proxy 80/443 → 127.0.0.1:3080. That's incompatible
            # with the `caddy` container which expects to own 80/443
            # itself. If nginx.service is present it silently wins the
            # port binding and every request returns `nginx` 502s.
            if systemctl list-unit-files 2>/dev/null | grep -q '^nginx\.service'; then
              echo "==> Disabling legacy host nginx (Caddy owns 80/443 now)"
              systemctl stop nginx 2>/dev/null || true
              systemctl disable nginx 2>/dev/null || true
              systemctl mask nginx 2>/dev/null || true
            fi

            # Raise sshd's unauth queue so scanner flood doesn't evict
            # GHA's handshake. Default (10:30:100) gets saturated on an
            # exposed droplet within ~15 min of boot.
            if ! grep -q '^MaxStartups 100:30:200' /etc/ssh/sshd_config; then
              echo "==> Hardening sshd against MaxStartups eviction"
              sed -i 's|^#*MaxStartups.*|MaxStartups 100:30:200|' /etc/ssh/sshd_config
              sed -i 's|^#*LoginGraceTime.*|LoginGraceTime 60|' /etc/ssh/sshd_config
              # reload (not restart) — keeps the current session alive
              systemctl reload ssh 2>/dev/null || systemctl reload sshd 2>/dev/null || true
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> Cloning repo to $APP_DIR"
              mkdir -p "$(dirname "$APP_DIR")"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            echo "==> Pulling latest code"
            git fetch origin "$BRANCH"
            # reset --hard leaves gitignored paths alone, so uploads/* survives.
            git reset --hard "origin/$BRANCH"

            # Bind-mounted in compose.yaml; ensure they exist so docker doesn't
            # auto-create them with surprising ownership.
            mkdir -p uploads/images uploads/bundles uploads/design-v2

            # Inquiry-form SMTP secrets — bind-mounted into `app` via
            # compose.yaml's `secrets:` block. Each file holds one
            # credential; `*_FILE=/run/secrets/<name>` env vars in the
            # container point at them. Bind-mount fails fast if the
            # source path is missing, so we materialise empty
            # placeholders here. The operator overwrites each file on
            # the droplet (`echo -n '...' > /opt/cms/secrets/smtp_pass`)
            # without redeploying. If a credential file stays empty
            # the inquiry mailer falls through to a clean 502 with
            # "SMTP not configured" — graceful degradation, no crash.
            mkdir -p secrets
            chmod 700 secrets
            for s in smtp_host smtp_port smtp_user smtp_pass mail_from; do
              if [ ! -f "secrets/$s" ]; then
                : > "secrets/$s"
                chmod 600 "secrets/$s"
              fi
            done

            # If DEPLOY_ENV_FILE is set, (re)write .env from it. If it's empty
            # (e.g. the original droplet already has .env on disk), leave the
            # existing file alone — but fail loudly if there's nothing at all.
            #
            # PRESERVE runtime-managed values across the rewrite. The CI
            # secret holds STATIC config (DOMAIN, NEXTAUTH_SECRET, …) and
            # has no knowledge of which blue/green slot is currently
            # active. `tools/blue-green-deploy.sh` writes
            # `ACTIVE_UPSTREAM=app-{blue,green}:80` to .env on every flip;
            # without this preservation, the next deploy clobbers it
            # back to the secret's value (or absent → default app:80) and
            # Caddy loses track of the active slot. Sky's first seamless
            # deploy on 2026-05-04 went down for this exact reason —
            # ACTIVE_UPSTREAM=app-green:80 disappeared on rewrite, Caddy
            # came up pointing at legacy app:80, ERR_SSL_PROTOCOL_ERROR.
            PRESERVED_ACTIVE_UPSTREAM=""
            if [ -f .env ]; then
              PRESERVED_ACTIVE_UPSTREAM=$(grep -E '^ACTIVE_UPSTREAM=' .env 2>/dev/null | tail -n1 || true)
            fi
            if [ -n "${DEPLOY_ENV_FILE:-}" ]; then
              umask 077
              printf '%s\n' "$DEPLOY_ENV_FILE" > .env
            elif [ ! -f .env ]; then
              echo "No DEPLOY_ENV_FILE secret and no existing .env on disk; aborting" >&2
              exit 1
            fi
            if [ -n "$PRESERVED_ACTIVE_UPSTREAM" ]; then
              # Drop any ACTIVE_UPSTREAM line from the freshly-written
              # secret (defensive — secret shouldn't have one, but if
              # the operator added one by mistake, the runtime value
              # wins) then append the preserved one.
              if grep -q '^ACTIVE_UPSTREAM=' .env 2>/dev/null; then
                sed -i '/^ACTIVE_UPSTREAM=/d' .env
              fi
              printf '%s\n' "$PRESERVED_ACTIVE_UPSTREAM" >> .env
              echo "==> Preserved $PRESERVED_ACTIVE_UPSTREAM across .env rewrite"
            fi

            # Pre-refactor deploys ran compose from /opt/cms/ so the
            # default project name was `cms`. Post-refactor we run from
            # /opt/cms/infra/, which would default to `infra`. Pin `-p cms`
            # everywhere so compose adopts the existing containers instead
            # of colliding on their globally-unique `container_name:`.
            #
            # One-time reconciliation: if any of our containers still
            # carry a mismatched compose-project label (from a historic
            # `docker run` or a plain compose call without -p), remove
            # them so the next `up -d` can re-create them under the
            # correct project. Named volumes (caddy_data for Let's
            # Encrypt, and the bind-mounted mongo_data / uploads) survive
            # container removal.
            for c in mongodb server front caddy; do
              if ! docker inspect "$c" >/dev/null 2>&1; then
                continue   # container doesn't exist, nothing to reconcile
              fi
              proj=$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project"}}' "$c" 2>/dev/null || echo "")
              if [ "$proj" != "cms" ]; then
                echo "==> Evicting stale container '$c' (project='$proj', expected 'cms')"
                docker rm -f "$c" >/dev/null 2>&1 || true
              fi
            done

            echo "==> Bringing up stack (mongo + server + caddy if not already running)"
            # First pass: start everything that's not running (no build).
            # Covers the case where nginx was just evicted and Caddy has
            # never claimed :80/:443, or mongo/server died since last deploy.
            # Compose is a no-op for services already healthy.
            export DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1
            docker compose -p cms -f infra/compose.yaml --env-file .env up -d --no-build mongodb server caddy || true

            # Always rebuild `server`. The pre-fix workflow only rebuilt
            # `app` (`--no-deps app`), leaving the `server` container
            # pinned to whatever image was current the *last* time it was
            # manually rebuilt — months-old standalone GraphQL builds
            # ended up live in production that way. A dirty-SHA check
            # to skip the rebuild on pure-frontend commits was attempted
            # twice and silently killed the deploy script both times
            # (the "Computing dirty-server diff" echo printed, then
            # exit 1 with no further log line — even with set +eu and
            # pre-validated SHAs). BuildKit layer cache already makes
            # a no-op `up --build server` ~5s, so the optimization
            # wasn't worth the failure mode. Removed.
            CUR_SHA=$(git rev-parse HEAD)
            echo "==> Rebuilding server (cur=$CUR_SHA)"
            docker compose -p cms -f infra/compose.yaml --env-file .env up --no-deps --build -d server
            echo "==> Waiting for server to report healthy"
            for i in $(seq 1 24); do
              status=$(docker inspect --format '{{.State.Health.Status}}' server 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "    server healthy after ${i} checks"
                break
              fi
              if [ "$i" = "24" ]; then
                echo "!! server failed to become healthy within 2 minutes" >&2
                docker compose -p cms -f infra/compose.yaml --env-file .env logs --tail=200 server >&2 || true
                exit 1
              fi
              sleep 5
            done

            # Decide deploy mode without || or case constructs.
            # appleboy/ssh-action sends the script as one string to
            # bash -c. Some bash versions on the droplets choke on
            # case statements with ;; inside that string (line 327 /
            # 350 syntax error near unexpected token ; on 2026-05-04).
            # Plain sequential ifs are the safe path.
            DEPLOY_MODE=legacy
            if [ "${SEAMLESS:-}" = "true" ]; then DEPLOY_MODE=seamless; fi
            if [ "${SEAMLESS:-}" = "1" ]; then DEPLOY_MODE=seamless; fi
            echo "==> Deploy mode: $DEPLOY_MODE"

            if [ "$DEPLOY_MODE" = "seamless" ]; then
              echo "==> Seamless (blue/green) app deploy"
              # P4 path: the script identifies which of `app-blue` /
              # `app-green` is idle, builds + starts the new image
              # there, health-checks it, verifies its `.git-sha`
              # matches TARGET_SHA, then atomically flips Caddy's
              # `ACTIVE_UPSTREAM` and reloads. Active instance keeps
              # serving live traffic the whole time — no 502 window.
              # See docs/runbooks/seamless-deployment.md.

              # Auto-bootstrap if app-blue / app-green don't exist yet.
              # CRITICAL: this is the first-time transition from the
              # legacy single-instance path (front container, Caddy
              # pointing at `app:80`) to the seamless path (blue/green,
              # Caddy pointing at app-blue:80 or app-green:80). It must
              # NOT cause public downtime — `front` keeps serving live
              # traffic the whole time. Two specific bugs the previous
              # version hit on skyclimber 2026-05-04:
              #   1. `docker compose ... up -d --build` without service
              #      names recreated `front` AND `caddy` along with
              #      creating blue/green. Front went down for the cold
              #      next-build window.
              #   2. Pre-seeding `ACTIVE_UPSTREAM=app-blue:80` in `.env`
              #      pointed Caddy at blue while blue was still mid-cold-
              #      build → "Shipping a fresh version" maintenance page
              #      for the duration of the build.
              # Fix: build ONLY the two new slots (explicit service names),
              # leave the legacy stack untouched, defer the Caddy flip
              # until blue is healthy + verified.
              if ! docker inspect app-blue >/dev/null 2>&1 || ! docker inspect app-green >/dev/null 2>&1; then
                echo "==> First-run seamless bootstrap (app-blue + app-green missing)"
                echo "    legacy front container keeps serving until app-blue is healthy"

                # Build + start ONLY the new slots. No `--build` cascade,
                # no implicit recreate of front/caddy. Both blue + green
                # come up in parallel so we eat the cold-build cost once.
                docker compose --profile seamless -p cms -f infra/compose.yaml --env-file .env up -d --build app-blue app-green

                # Wait for BOTH slots — blue to be the new active, green
                # to be ready for the next deploy. 10-min ceiling matches
                # the legacy front-container poll.
                for slot in app-blue app-green; do
                  echo "==> Waiting for $slot to report healthy"
                  for i in $(seq 1 216); do
                    status=$(docker inspect --format '{{.State.Health.Status}}' "$slot" 2>/dev/null || echo starting)
                    if [ "$status" = "healthy" ]; then
                      echo "    $slot healthy after ${i} checks"
                      break
                    fi
                    if [ "$i" = "120" ]; then
                      echo "!! $slot failed to become healthy within 18 minutes" >&2
                      docker logs --tail=200 "$slot" >&2 || true
                      exit 1
                    fi
                    sleep 5
                  done
                done

                # NOW flip Caddy to blue. blue is healthy; this is the
                # only public-facing change in the bootstrap. Atomic
                # Caddy reload (graceful — finishes in-flight requests
                # on the legacy upstream first).
                if grep -q '^ACTIVE_UPSTREAM=' .env 2>/dev/null; then
                  sed -i 's|^ACTIVE_UPSTREAM=.*|ACTIVE_UPSTREAM=app-blue:80|' .env
                else
                  echo 'ACTIVE_UPSTREAM=app-blue:80' >> .env
                fi
                echo "    flipped ACTIVE_UPSTREAM → app-blue:80"
                docker exec caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || \
                  docker compose -p cms -f infra/compose.yaml --env-file .env restart caddy
                echo "==> Bootstrap complete; legacy front retired, blue is now serving traffic"
                # Optional cleanup: legacy front container is no longer
                # in the routing path. Leave it running for now — blue/
                # green-deploy.sh handles its own flips from here on,
                # and front can be `docker rm -f`'d in a follow-up
                # housekeeping task once the seamless path is stable.
              fi
              # 1080s (18 min) ceiling matches the legacy front-container health
              # loop. Cold `next build` inside the freshly-recreated
              # slot takes 5-8 min on the droplet's CPU budget; the
              # previous 60s default aborted flips that would have
              # eventually succeeded.
              # 1800s (30 min) ceiling — bumped from 1080s after a
              # 2026-05-08 skyclimber deploy aborted at 18 min while
              # `next build` was still finishing on the 1-vCPU droplet.
              # Cold rebuild after deps changes occasionally crosses
              # 18-25 min when antd/rc-* modules need full re-transpile.
              # 1800s gives breathing room without hiding genuine deploy
              # failures.
              TARGET_SHA="$CUR_SHA" \
                DEPLOY_HEALTH_TIMEOUT="${DEPLOY_HEALTH_TIMEOUT:-1800}" \
                DRAIN_SECONDS="${DRAIN_SECONDS:-30}" \
                bash tools/legacy/blue-green-deploy.sh
              # blue-green script exits 0 on a successful flip; its own
              # health check covers the inactive→active transition. We
              # still run the public smoke check below to verify Caddy
              # is honouring the new upstream from the outside.
              echo "==> Seamless flip complete; falling through to public smoke check"
            fi

            if [ "$DEPLOY_MODE" = "legacy" ]; then
              echo "==> Rebuilding and restarting app (legacy stop-the-world; brief 502 window)"
              # `--no-deps app` leaves mongodb / server / caddy running
              # untouched, so TLS doesn't blip and the DB connection pool
              # survives. Caddy keeps serving the previous container's
              # port 80 until the new `app` is healthy, then Docker
              # swaps them. BuildKit picks up layer cache from the prior
              # build automatically on the same host.
              #
              # Trap the exit code explicitly. Docker compose v2 sometimes
              # returns non-zero after a successful `up` when a sibling
              # service's healthcheck is briefly stale — under
              # `set -euo pipefail` that aborts the deploy mid-stride
              # without a clear error. Capturing the code lets us decide
              # rather than getting silently 'set -e'd.
              set +e
              docker compose -p cms -f infra/compose.yaml --env-file .env up --no-deps --build -d app
              UP_RC=$?
              set -e
              echo "==> docker compose up app returned: $UP_RC"
              if [ "$UP_RC" != "0" ]; then
                # Show what's actually unhappy so we can diagnose without
                # another round-trip through CI.
                docker compose -p cms -f infra/compose.yaml --env-file .env ps >&2 || true
                docker compose -p cms -f infra/compose.yaml --env-file .env logs --tail=80 app >&2 || true
                exit "$UP_RC"
              fi
            fi

            # Skip the `front` health loop when seamless ran — the
            # blue-green script already health-checked its inactive
            # instance + verified the SHA before flipping Caddy, and
            # `front` doesn't exist in the seamless compose profile
            # anyway (replaced by app-blue + app-green). The public
            # smoke check below covers the post-flip Caddy path.
            if [ "$DEPLOY_MODE" = "seamless" ]; then
              echo '==> Skipping legacy front-container health loop (seamless path; already health-checked pre-flip)'
            else
            echo "==> Waiting for app to report healthy"
            # Poll the compose healthcheck (defined in compose.yaml) for
            # up to 18 minutes before giving up. Cold builds (no
            # BuildKit cache, fresh `next build` SSG pass) routinely run
            # 6-8 min on the droplet's small CPU budget; the previous
            # 3-min cap was tripping legitimate deploys. The
            # appleboy/ssh-action `command_timeout: 35m` set above
            # gives this loop room to run plus the server-rebuild loop
            # plus image pulls.
            for i in $(seq 1 216); do
              status=$(docker inspect --format '{{.State.Health.Status}}' front 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "    app healthy after ${i} checks"
                break
              fi
              if [ "$i" = "120" ]; then
                echo "!! app failed to become healthy within 18 minutes" >&2
                docker compose -p cms -f infra/compose.yaml --env-file .env logs --tail=200 app >&2 || true
                exit 1
              fi
              sleep 5
            done
            fi

            echo "==> Smoke check: HTTPS via Caddy returns 200"
            # Hit Caddy via 127.0.0.1 + --resolve so SNI stays correct
            # (= the public domain) but the TCP connection goes to the
            # local docker-proxy instead of round-tripping through the
            # droplet's own public IP. DigitalOcean's NAT doesn't always
            # hairpin properly — `curl https://skyclimber.pro/` from the
            # droplet itself returns a TLS internal-error alert even
            # while external clients get clean 200s. The --resolve
            # path tests the same Caddy → app upstream chain that real
            # public traffic uses, just without the cloud round-trip.
            SMOKE_URL="${SMOKE_URL:-https://funisimo.pro/}"
            SMOKE_HOST=$(echo "$SMOKE_URL" | sed -E 's|^https?://([^/]+).*|\1|')
            smoke_code=$(curl -sSL --resolve "${SMOKE_HOST}:443:127.0.0.1" -o /dev/null -w "%{http_code}" --max-time 20 "$SMOKE_URL" || echo "000")
            if [ "$smoke_code" != "200" ]; then
              echo "!! Smoke check failed: $SMOKE_URL returned $smoke_code" >&2
              # Diagnostics: localhost (no SNI), the same --resolve probe
              # again with -I for headers, and the last 20 app log lines.
              curl -sS -o /dev/null -w "localhost http_code: %{http_code}\n" --max-time 10 http://localhost/ >&2 || true
              curl -sSIL --resolve "${SMOKE_HOST}:443:127.0.0.1" --max-time 10 "$SMOKE_URL" 2>&1 | head -1 >&2 || true
              docker compose -p cms -f infra/compose.yaml --env-file .env logs --tail=20 app >&2 || true
              exit 1
            fi

            # MCP HTTP transport — rebuild + restart on every deploy.
            # Per docs/runbooks/mcp-http-deploy.md. Skipped when
            # MCP_HTTP_ENABLED isn't set in `.env`; the service exits
            # cleanly in that case. Done AFTER the public site is
            # confirmed healthy so a misconfigured MCP build never blocks
            # customer-facing traffic. Failure here is logged but
            # doesn't fail the whole deploy — the public site is already
            # serving the new build, and the mcp container keeps running
            # the previous build until the next deploy retries.
            if grep -qE '^MCP_HTTP_ENABLED=true' /opt/cms/.env 2>/dev/null; then
              echo '==> Rebuilding mcp service'
              if docker compose -p cms -f infra/compose.yaml --env-file .env build mcp; then
                docker compose -p cms -f infra/compose.yaml --env-file .env up -d --no-deps mcp
                echo '    mcp restarted'
              else
                echo '!! mcp build failed — public site is healthy; investigate mcp separately' >&2
              fi
            else
              echo '==> Skipping mcp rebuild (MCP_HTTP_ENABLED!=true in .env)'
            fi

            docker compose -p cms -f infra/compose.yaml --env-file .env ps
            echo "==> Deploy complete"
