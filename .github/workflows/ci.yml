name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  # Adds a "Run workflow" button in the Actions tab for manual re-runs.
  workflow_dispatch:

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        # `--legacy-peer-deps` matches how we install locally (antd / react peer dep chain);
        # `--ignore-scripts` skips the bcrypt/native-compile step that doesn't work
        # on the CI image by default. Tests mock bcrypt-heavy paths.
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Typecheck (frontend)
        run: npx tsc --noEmit -p ui/client/tsconfig.json

      - name: Typecheck (tests)
        # Tests live behind a separate tsconfig because vitest is a devDep
        # and the production Docker image (NODE_ENV=production) doesn't
        # install it — `next build`'s typecheck would otherwise fail to
        # resolve `vitest/globals`.
        run: npx tsc --noEmit -p tsconfig.test.json

      - name: Tests
        run: npm test -- --reporter=dot

  # Switched back to the original droplet (funisimo.pro). skyclimber.pro secrets
  # (DEPLOY_HOST_2 / DEPLOY_ENV_FILE_2) remain in GitHub — change the secret
  # refs below back to *_2 to re-target the client droplet.

  deploy:
    name: Deploy to funisimo.pro droplet
    runs-on: ubuntu-latest
    needs: test-and-typecheck
    # Only deploy on direct pushes to master, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # Holds the appleboy/ssh-action command_timeout (30m) plus the
    # workflow setup/teardown around it.
    timeout-minutes: 40
    env:
      DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE_1 }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST_1 }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_ENV_FILE
          script_stop: true
          # Default appleboy/ssh-action command_timeout is 10m, which fires
          # before the inner app-healthy loop on cold deploys (image pull +
          # `next build` regularly take 6-8m alone). Bumped to 30m so the
          # SSH session outlasts the inner timeouts; the GHA job timeout
          # (timeout-minutes: 30 above) is the real upper bound.
          command_timeout: 30m
          script: |
            set -euo pipefail

            REPO_URL="https://github.com/${{ github.repository }}.git"
            APP_DIR="/opt/cms"
            BRANCH="master"

            # Bootstrap steps below are idempotent — no-ops on subsequent deploys.

            if ! command -v git >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
              echo "==> Installing base packages"
              apt-get update -y
              apt-get install -y git curl ca-certificates
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "==> Installing Docker"
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi
            if ! docker compose version >/dev/null 2>&1; then
              apt-get update -y
              apt-get install -y docker-compose-plugin
            fi

            # fail2ban protects sshd from the constant scanner flood that
            # otherwise saturates MaxStartups and blocks legit SSH logins.
            if ! command -v fail2ban-client >/dev/null 2>&1; then
              echo "==> Installing fail2ban"
              apt-get update -y
              apt-get install -y fail2ban
              systemctl enable --now fail2ban
            fi

            # The pre-Caddy architecture installed nginx on the host to
            # reverse-proxy 80/443 → 127.0.0.1:3080. That's incompatible
            # with the `caddy` container which expects to own 80/443
            # itself. If nginx.service is present it silently wins the
            # port binding and every request returns `nginx` 502s.
            if systemctl list-unit-files 2>/dev/null | grep -q '^nginx\.service'; then
              echo "==> Disabling legacy host nginx (Caddy owns 80/443 now)"
              systemctl stop nginx 2>/dev/null || true
              systemctl disable nginx 2>/dev/null || true
              systemctl mask nginx 2>/dev/null || true
            fi

            # Raise sshd's unauth queue so scanner flood doesn't evict
            # GHA's handshake. Default (10:30:100) gets saturated on an
            # exposed droplet within ~15 min of boot.
            if ! grep -q '^MaxStartups 100:30:200' /etc/ssh/sshd_config; then
              echo "==> Hardening sshd against MaxStartups eviction"
              sed -i 's|^#*MaxStartups.*|MaxStartups 100:30:200|' /etc/ssh/sshd_config
              sed -i 's|^#*LoginGraceTime.*|LoginGraceTime 60|' /etc/ssh/sshd_config
              # reload (not restart) — keeps the current session alive
              systemctl reload ssh 2>/dev/null || systemctl reload sshd 2>/dev/null || true
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> Cloning repo to $APP_DIR"
              mkdir -p "$(dirname "$APP_DIR")"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            echo "==> Pulling latest code"
            git fetch origin "$BRANCH"
            # reset --hard leaves gitignored paths alone, so uploads/* survives.
            git reset --hard "origin/$BRANCH"

            # Bind-mounted in compose.yaml; ensure they exist so docker doesn't
            # auto-create them with surprising ownership.
            mkdir -p uploads/images uploads/bundles uploads/design-v2

            # If DEPLOY_ENV_FILE is set, (re)write .env from it. If it's empty
            # (e.g. the original droplet already has .env on disk), leave the
            # existing file alone — but fail loudly if there's nothing at all.
            if [ -n "${DEPLOY_ENV_FILE:-}" ]; then
              umask 077
              printf '%s\n' "$DEPLOY_ENV_FILE" > .env
            elif [ ! -f .env ]; then
              echo "No DEPLOY_ENV_FILE secret and no existing .env on disk; aborting" >&2
              exit 1
            fi

            # Pre-refactor deploys ran compose from /opt/cms/ so the
            # default project name was `cms`. Post-refactor we run from
            # /opt/cms/infra/, which would default to `infra`. Pin `-p cms`
            # everywhere so compose adopts the existing containers instead
            # of colliding on their globally-unique `container_name:`.
            #
            # One-time reconciliation: if any of our containers still
            # carry a mismatched compose-project label (from a historic
            # `docker run` or a plain compose call without -p), remove
            # them so the next `up -d` can re-create them under the
            # correct project. Named volumes (caddy_data for Let's
            # Encrypt, and the bind-mounted mongo_data / uploads) survive
            # container removal.
            for c in mongodb server front caddy; do
              if ! docker inspect "$c" >/dev/null 2>&1; then
                continue   # container doesn't exist, nothing to reconcile
              fi
              proj=$(docker inspect --format '{{index .Config.Labels "com.docker.compose.project"}}' "$c" 2>/dev/null || echo "")
              if [ "$proj" != "cms" ]; then
                echo "==> Evicting stale container '$c' (project='$proj', expected 'cms')"
                docker rm -f "$c" >/dev/null 2>&1 || true
              fi
            done

            echo "==> Bringing up stack (mongo + server + caddy if not already running)"
            # First pass: start everything that's not running (no build).
            # Covers the case where nginx was just evicted and Caddy has
            # never claimed :80/:443, or mongo/server died since last deploy.
            # Compose is a no-op for services already healthy.
            export DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1
            docker compose -p cms -f infra/compose.yaml --env-file .env up -d --no-build mongodb server caddy || true

            # Rebuild `server` whenever the commit touches services/ or
            # the ServerDockerfile. The pre-fix workflow only rebuilt
            # `app` (with `--no-deps app`), leaving the `server`
            # container pinned to whatever image was current the *last*
            # time someone manually rebuilt it — which is how a
            # months-old standalone GraphQL build ended up live in
            # production. BuildKit layer cache makes the no-op case
            # cheap (~5s) when nothing under services/ changed; the
            # explicit dirty check still avoids the container churn for
            # pure-frontend deploys.
            DIRTY_SERVER=0
            LAST_SHA_FILE="/opt/cms/.last-deploy-sha"
            CUR_SHA=$(git rev-parse HEAD)
            echo "==> Computing dirty-server diff (cur=$CUR_SHA)"
            if [ -f "$LAST_SHA_FILE" ]; then
              LAST_SHA=$(cat "$LAST_SHA_FILE")
              echo "    last-deployed SHA: $LAST_SHA"
              # Wrap in `|| true` so a missing/unreachable LAST_SHA (force-push,
              # branch reset, repo GC) doesn't trip `set -euo pipefail` and
              # silently kill the script with no log line. Worst case the
              # diff fails and we fall through to a rebuild — never the wrong
              # direction for safety.
              CHANGED=$(git diff --name-only "$LAST_SHA" "$CUR_SHA" -- services/ infra/ServerDockerfile shared/ 2>/dev/null || echo "__DIFF_FAILED__")
              if [ "$CHANGED" = "__DIFF_FAILED__" ]; then
                echo "    git diff failed (LAST_SHA likely unreachable); rebuilding server to be safe"
                DIRTY_SERVER=1
              elif [ -n "$CHANGED" ]; then
                DIRTY_SERVER=1
              fi
            else
              # First deploy after introducing the dirty-check — be
              # safe and rebuild server once.
              echo "    no last-SHA file; rebuilding server (first run)"
              DIRTY_SERVER=1
            fi
            if [ "$DIRTY_SERVER" = "1" ]; then
              echo "==> services/ or ServerDockerfile changed; rebuilding server"
              docker compose -p cms -f infra/compose.yaml --env-file .env up --no-deps --build -d server
              echo "==> Waiting for server to report healthy"
              for i in $(seq 1 24); do
                status=$(docker inspect --format '{{.State.Health.Status}}' server 2>/dev/null || echo "starting")
                if [ "$status" = "healthy" ]; then
                  echo "    server healthy after ${i} checks"
                  break
                fi
                if [ "$i" = "24" ]; then
                  echo "!! server failed to become healthy within 2 minutes" >&2
                  docker compose -p cms -f infra/compose.yaml --env-file .env logs --tail=200 server >&2 || true
                  exit 1
                fi
                sleep 5
              done
            else
              echo "==> services/ unchanged; skipping server rebuild"
            fi

            echo "==> Rebuilding and restarting app (zero-downtime)"
            # `--no-deps app` leaves mongodb / server / caddy running
            # untouched, so TLS doesn't blip and the DB connection pool
            # survives. Caddy keeps serving the previous container's
            # port 80 until the new `app` is healthy, then Docker
            # swaps them. BuildKit picks up layer cache from the prior
            # build automatically on the same host.
            docker compose -p cms -f infra/compose.yaml --env-file .env up --no-deps --build -d app

            echo "==> Waiting for app to report healthy"
            # Poll the compose healthcheck (defined in compose.yaml) for
            # up to 10 minutes before giving up. Cold builds (no
            # BuildKit cache, fresh `next build` SSG pass) routinely run
            # 6-8 min on the droplet's small CPU budget; the previous
            # 3-min cap was tripping legitimate deploys. The
            # appleboy/ssh-action `command_timeout: 30m` set above
            # gives this loop room to run plus the server-rebuild loop
            # plus image pulls.
            for i in $(seq 1 120); do
              status=$(docker inspect --format '{{.State.Health.Status}}' front 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "    app healthy after ${i} checks"
                break
              fi
              if [ "$i" = "120" ]; then
                echo "!! app failed to become healthy within 10 minutes" >&2
                docker compose -p cms -f infra/compose.yaml --env-file .env logs --tail=200 app >&2 || true
                exit 1
              fi
              sleep 5
            done

            echo "==> Smoke check: public domain returns 200"
            # Hit the public origin via Caddy, not localhost:80 — catches
            # TLS / reverse-proxy regressions as well as app health.
            SMOKE_URL="${SMOKE_URL:-https://funisimo.pro/}"
            # -L follows redirects (Caddy may 301 http→https or /→/en),
            # we count "final landing returned 200" as healthy. On
            # failure dump headers + first 500 chars of body + the
            # localhost:80 result so the log tells us whether the
            # problem is the app, Caddy, TLS or DNS.
            smoke_code=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 20 "$SMOKE_URL" || echo "000")
            if [ "$smoke_code" != "200" ]; then
              echo "!! Smoke check failed: $SMOKE_URL returned $smoke_code" >&2
              echo "---- response headers ($SMOKE_URL) ----" >&2
              curl -sSIL --max-time 20 "$SMOKE_URL" >&2 || true
              echo "---- response body head ($SMOKE_URL) ----" >&2
              curl -sSL --max-time 20 "$SMOKE_URL" 2>/dev/null | head -c 500 >&2 || true
              echo >&2
              echo "---- localhost:80 (bypass Caddy) ----" >&2
              curl -sS -o /dev/null -w "localhost http_code: %{http_code}\n" --max-time 10 http://localhost/ >&2 || true
              echo "---- recent app logs ----" >&2
              docker compose -p cms -f infra/compose.yaml --env-file .env logs --tail=80 app >&2 || true
              exit 1
            fi

            # Record this commit SHA so the next deploy can diff
            # services/ + ServerDockerfile against it and skip the
            # server rebuild when the change set is purely frontend.
            echo "$CUR_SHA" > "$LAST_SHA_FILE"

            docker compose -p cms -f infra/compose.yaml --env-file .env ps
            echo "==> Deploy complete"
