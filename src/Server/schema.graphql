input InSection {
    id: String
    type: Int!
    page: String!
    content: [InItem]
    slots: [Int]
    overlay: Boolean
    overlayAnchor: String
}

input InItem {
    name: String
    type: String!
    style: String!
    content: String!
    action: String
    actionStyle: String
    actionType: String
    actionContent: String
}

input InImage {
    id: String!
    name: String!
    location: String!
    created: String!
    type: String!
    size: Int!
    tags: [String]
}
input InLogo {
    content: String!
}
input InSeo {
    description: String
    keywords: [String]
    viewport: String
    charSet: String
    url: String
    image: String
    image_alt: String
    published_time: String
    modified_time: String
    author: String
    locale: String
}
input InNavigation {
    id: String!
    type: String!
    page: String!
    seo: InSeo
    sections: [String]!
}

input InLanguage {
    label: String!
    symbol: String!
    default: Boolean
    flag: String
}
input InUser {
    id: String
    name: String
    email: String
    password: String
    role: String
    avatar: String
    canPublishProduction: Boolean
}
type INewLanguage {
    label: String!
    symbol: String!
    default: Boolean
    flag: String
    editedBy: String
    editedAt: String
}
type IUser {
    id: String!
    name: String
    email: String!
    password: String!
    role: String
    avatar: String
    canPublishProduction: Boolean
}

type ILogo {
    id: String
    type: String
    content: String!
    editedBy: String
    editedAt: String
}

type IImage {
    id: String!
    name: String!
    location: String!
    created: String!
    type: String!
    size: Int!
    tags: [String]!
}

type IItem {
    name: String
    type: String!
    style: String
    content: String!
    action: String
    actionStyle: String
    actionType: String
    actionContent: String
}
type ISection {
    id: String
    page: String
    type: Int!
    content: [IItem]
    slots: [Int]
    overlay: Boolean
    overlayAnchor: String
    """Optimistic-concurrency counter — see src/Server/conflict.ts."""
    version: Int
    editedBy: String
    editedAt: String
}
type ISeo {
    description: String
    keywords: [String]
    viewport: String
    charSet: String
    url: String
    image: String
    image_alt: String
    published_time: String
    modified_time: String
    author: String
    locale: String
}
type INavigation {
    id: String
    type: String!
    page: String!
    seo: ISeo
    sections: [String]!
    editedBy: String
    editedAt: String
}

type ILoadData {
    name: String
    sizeOnDisk: Float
    empty: Boolean
}

type QueryMongo {
    setupAdmin: IUser
    getMongoDBUri: String
    loadData: [ILoadData!]!
    getNavigationCollection: [INavigation!]!
    getSections(ids: [String]): [ISection!]!
    getImages(tags: String!): [IImage!]!
    getLogo: ILogo
    getUser(email: String): IUser
    getUsers: [IUser!]!
    getLanguages: [INewLanguage]
    getPublishedSnapshot: String
    getPublishedMeta: String
    getThemes: String!
    getActiveTheme: String
    getPublishedHistory(limit: Int): String!
    getPosts(includeDrafts: Boolean, limit: Int): String!
    getPost(slug: String!, includeDrafts: Boolean): String
    getFooter: String!
    getSiteFlags: String!
    getSiteSeo: String!
    getTranslationMeta: String!
}

scalar JSON

type MutationMongo {
    createNavigation(navigation: InNavigation!): String!
    addUpdateNavigationItem(pageName: String!, sections: [String]): String!
    updateNavigation(page: String!, sections: [String]): String!
    replaceUpdateNavigation(oldPageName: String!,navigation: InNavigation): String!
    addUpdateSectionItem(section: InSection!, pageName: String, expectedVersion: Int): String!
    removeSectionItem(id:String!): String!
    deleteNavigationItem(pageName:String!): String!
    saveImage(image: InImage!): String!
    deleteImage(id: String!): String!
    saveLogo(content: String!): String!
    addUpdateLanguage(language: InLanguage, translations: JSON): String!
    deleteLanguage(language: InLanguage): String!
    addUser(user: InUser!): String!
    updateUser(user: InUser!): String!
    removeUser(id: String!): String!
    publishSnapshot(note: String): String!
    rollbackToSnapshot(id: String!): String!
    saveTheme(theme: JSON!, expectedVersion: Int): String!
    deleteTheme(id: String!): String!
    setActiveTheme(id: String!): String!
    savePost(post: JSON!, expectedVersion: Int): String!
    deletePost(id: String!): String!
    setPostPublished(id: String!, publish: Boolean!): String!
    saveFooter(config: JSON!, expectedVersion: Int): String!
    saveSiteFlags(flags: JSON!, expectedVersion: Int): String!
    saveSiteSeo(seo: JSON!, expectedVersion: Int): String!
    saveTranslationMeta(meta: JSON!, expectedVersion: Int): String!
}


type Query {
    sample: String!
    greeting: String!
    bar: String!
    mongo: QueryMongo!
}

type Mutation {
    mongo: MutationMongo!
}