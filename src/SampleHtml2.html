<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /* Table-like container using CSS table display properties */
        .div-table {
            display: table;
            width: 100%;
            border-collapse: collapse; /* visually similar to table */
            border: 1px dotted #ddd;
            margin: 16px 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .row {
            display: table-row;
        }

        .div-cell {
            display: table-cell;
            padding: 8px 12px;
            border: 1px solid #ddd;
            vertical-align: middle;
        }

        /* utility to stack content vertically inside a cell */
        .cell-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        /* ensure the image inside the stacked cell keeps the requested size and fits */
        .cell-column img {
            width: 50px;
            height: 100px;
            object-fit: cover;
            display: block;
        }

        .row.header {
            font-weight: 700;
            background: #f7f7f7;
        }

    </style>

</head>
<body>

<div class="div-table" >
    <div class="row header" role="row">
        <div class="div-cell" role="columnheader">Jautajums</div>
        <div class="div-cell" role="columnheader">Column 2</div>
        <div class="div-cell" role="columnheader">Column 3</div>
    </div>

    <div class="row" role="row">
        <div class="div-cell" role="cell"><div class="cell-column">Row 2 — Col 1 <img src="https://picsum.photos/50/100" alt="Random" width="50" height="100" /></div></div>
        <div class="div-cell" role="cell">
            <div class="cell-column">
                <label>Ko tu redzi bildē</label>
                <select id="atbilde1" name="row2-select">
                    <option value="opt1">Ne</option>
                    <option value="opt2">ja</option>
                    <option value="opt3">Ne</option>
                    <option value="opt4">Ne</option>
                </select>
            </div>
        </div>
        <div class="div-cell" role="cell">
            <button id="check-btn1">Check</button>
            <input id="result-input1" type="text" readonly aria-label="Result input" />
        </div>
    </div>

    <div class="row" role="row">
        <div class="div-cell" role="cell">Row 3 — Col 1</div>
        <div class="div-cell" role="cell">Row 3 — Col 2</div>
        <div class="div-cell" role="cell"></div>
    </div>

    <div class="row" role="row">
        <div class="div-cell" role="cell">Row 4 — Col 1</div>
        <div class="div-cell" role="cell">Row 4 — Col 2</div>
        <div class="div-cell" role="cell">Row 4 — Col 3</div>
    </div>
    <div class="row" role="row">
        <div class="div-cell" role="cell">Jautajums</div>
        <div class="div-cell" role="cell">
            <div class="cell-column">
                <label>Ko tu redzi bildē</label>
                <select id="atbilde2" name="row2-select">
                    <option value="opt1">Ja</option>
                    <option value="opt2">Ne</option>
                    <option value="opt3">Ne</option>
                    <option value="opt4">Ne</option>
                </select>
            </div>
        </div>
        <div class="div-cell" role="cell">
            <button id="check-btn2">Check</button>
            <input id="result-input2" type="text" readonly aria-label="Result input" />
        </div>
    </div>
    <script>

        var sel1 = document.getElementById('atbilde1');
        var btn1 = document.getElementById('check-btn1');
        var out1 = document.getElementById('result-input1');
        if (btn1 && sel1 && out1) {
            btn1.addEventListener('click', function () {
                // second from the top means index 1 (0-based)
                var isSecond = sel1.selectedIndex === 1;
                out1.value = isSecond ? 'Pareizi' : 'Nepareizi';
            });
        }
        var sel2 = document.getElementById('atbilde2');
        var btn2 = document.getElementById('check-btn2');
        var out2 = document.getElementById('result-input2');
        if (btn2 && sel2 && out2) {
            btn2.addEventListener('click', function () {
                // second from the top means index 1 (0-based)
                var isSecond = sel2.selectedIndex === 0;
                out2.value = isSecond ? 'Pareizi' : 'Nepareizi';
            });
        }
    </script>
</div>

</body>
</html>
