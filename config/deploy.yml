# Kamal deploy config — funisimo.pro.
#
# Read by `kamal deploy` from CI (and locally
# during cutover). Replaces the inline ssh script in `.github/workflows/
# ci.yml` for funisimo only — skyclimber stays on the legacy bash deploy
# until funisimo runs stable on Kamal for ≥ 1 release cycle.
#
# Operator runbook: `docs/runbooks/kamal-deploy.md`.

service: cms

# GHCR image. CI pushes `ghcr.io/gatispriede/cms:<sha>` per commit; Kamal
# resolves `<sha>` from the working-tree git SHA at deploy time, so a
# `kamal deploy` always lines up with whatever HEAD points to.
image: gatispriede/cms

# `app.servers` lists the production droplet by domain. The reserved IP
# is what DNS resolves to, so referencing the apex domain works for both
# Terraform-managed and pre-Terraform droplets — Kamal SSH-connects, no
# DNS-cache concerns.
servers:
  web:
    hosts:
      - funisimo.pro
    # The compose stack splits into two networks:
    #   - `cms_back-end` carries mongodb, standalone-graphql server,
    #     mcp. cms-web needs this so MONGODB_URI=mongodb://mongodb:27017
    #     and ad-hoc graphql calls resolve.
    #   - `cms_front-end` carries caddy. cms-web needs this so caddy
    #     can reverse-proxy by `cms-web:80` after the ACTIVE_UPSTREAM
    #     flip. Without both, Caddy returns 502 (verified the hard way
    #     during 2026-05-08 cutover — Caddy is on front-end only and
    #     can't see back-end-only containers).
    # Kamal v2 takes a single network in `options.network`; for the
    # second, post-deploy step runs `docker network connect`.
    # Container runtime config. Three things to note:
    #
    # 1. `env-file: /opt/cms/.env` — droplet already carries the full
    #    runtime env (MONGODB_URI, SMTP_*, INITIAL_ADMIN_*, etc.) at
    #    /opt/cms/.env from the legacy compose stack. Pointing kamal at
    #    it avoids mirroring the same 9 secrets into GHA repo settings.
    #    Drops the entire `env: secret:` block below as a result.
    #
    # 2. `network: cms_back-end` — primary network so MONGODB_URI=
    #    mongodb://mongodb:27017 + standalone-graphql + mcp resolve.
    #
    # 3. cms_front-end (caddy network) is attached POST-deploy via the
    #    kamal post-deploy hook (`.kamal/hooks/post-deploy`). Kamal v2
    #    `options.network` only takes one; the hook fixes that gap.
    options:
      network: cms_back-end
      env-file: /opt/cms/.env

# SSH — funisimo's sshd currently allows root (verified 2026-05-08:
# `PermitRootLogin yes`, only `root` has authorised keys, no
# non-system user accounts). Hardening to a non-root operator user is
# a separate item; for now Kamal connects as root, same as the legacy
# bash deploy.
#
# Key auth uses the same `secrets.DEPLOY_SSH_KEY` the legacy CI deploy
# uses; Kamal's `ssh-agent` integration picks it up via `ssh-add` in
# the GHA workflow step.
ssh:
  user: root
  # `verify_host_key: never` disables Net::SSH's host-key validation
  # that was failing on master 1d73149 with HostKeyMismatch despite
  # ssh-keyscan'ing the apex + both IPs into ~/.ssh/known_hosts.
  # Net::SSH's compound-key lookup doesn't always match hashed
  # known_hosts entries, and the GHA runner is ephemeral so strict
  # verification adds no real security — auth is the DEPLOY_SSH_KEY
  # private key (a MITM would need that key to spoof). Belt-and-braces
  # alongside the runner's `~/.ssh/config` StrictHostKeyChecking=no
  # block in `.github/workflows/ci.yml#deploy-funisimo`.
  options:
    verify_host_key: never

registry:
  server: ghcr.io
  username: gatispriede
  password:
    # Read from Kamal's host env at deploy time. CI sets this from
    # `secrets.GITHUB_TOKEN` (which already has packages:read on the
    # repo); operator can use a personal token with `read:packages` for
    # local `kamal deploy` runs.
    - GHCR_PAT

# Skip kamal-proxy entirely (operator decision 2026-05-08, option A).
# Caddy is the existing public front — it terminates TLS, serves
# `/uploads/*`, `/design-v2/*`, MCP routing, SWR cache. kamal-proxy
# would either need a non-default port or fight Caddy for 80/443.
#
# Kamal v2 doesn't accept `proxy: false`. To skip proxy registration
# we pass `--skip-proxy-deploy --skip-proxy-boot` to `kamal deploy`
# in CI (see `.github/workflows/ci.yml#deploy-funisimo`). The proxy:
# block here is omitted entirely so kamal doesn't try to validate it.
#
# Cutover behaviour: kamal pulls + boots the new `cms-web` container
# on cms_back-end. Post-deploy hook attaches cms_front-end. Caddy
# already points at `cms-web:80` from the 2026-05-08 manual cutover.

# Runtime env comes from /opt/cms/.env on the droplet (see
# `servers.web.options.env-file` above). No `env: clear:` / `env: secret:`
# blocks because the `--env-file` covers everything the running container
# needs (MONGODB_URI, SMTP_*, NODE_ENV, DOMAIN, INITIAL_ADMIN_*, …).
#
# To rotate a secret: edit /opt/cms/.env on the droplet directly, then
# `kamal app boot` to recreate the container. Same pattern the legacy
# compose stack used.

# Healthcheck — Kamal v2 only accepts a `healthcheck:` block when the
# proxy is on (it's how kamal-proxy decides when to flip slots). With
# `proxy: false` (Caddy stays in front), the container's readiness is
# verified two other ways:
#   1. Kamal waits for `docker run` to exit successfully, then leaves
#      the container running. If `node ui/client/server.js` crashes on
#      boot the container exits and kamal aborts the deploy.
#   2. `.kamal/hooks/post-deploy` runs after kamal considers the deploy
#      successful, hits `https://funisimo.pro/api/health` over the public
#      Caddy path, and fails the CI step on non-200.
# Net effect: same gate as a kamal-native healthcheck, just split between
# the boot exit code and the public-side smoke. Adequate for our setup.

# Asset persistence. The site reads `/srv/uploads/{images,bundles}`
# from a host bind mount; same dirs the legacy compose uses. Kamal's
# `volumes` survives container swaps, so admins keep their uploaded
# images across deploys without involving DO Spaces.
volumes:
  - "/opt/cms/uploads:/srv/uploads"

# Builder — runs `docker build` against the multi-stage AppDockerfile.
# `local: false` + `arch: amd64` would push the build to a remote builder;
# we use the GHA runner (amd64) so this stays local-to-CI.
builder:
  dockerfile: infra/AppDockerfile
  arch: amd64
  args:
    GIT_SHA: <%= `git rev-parse HEAD`.strip %>

# Aliases — convenience commands for operator workflows. Ship a one-off
# bundle import without tearing down the running container:
#   kamal app exec --interactive 'node tools/bundle-import.js /srv/uploads/bundles/latest.zip'
#
# `console` opens a node REPL inside the running container — handy for
# poking at the running process during incidents.
aliases:
  console: app exec --interactive 'node'
  logs: app logs --follow
  shell: app exec --interactive 'sh'
