# Kamal deploy config — shared base for funisimo + skyclimber.
#
# Per-tenant `hosts:` override lives in:
#   - `config/deploy.funisimo.yml`
#   - `config/deploy.skyclimber.yml`
#
# CI invokes `kamal app boot --destination=<tenant> --version=<sha>`
# which loads this file first, then merges the destination overlay on
# top. Anything tenant-specific belongs in the overlay; anything shared
# stays here.
#
# Operator runbook: `docs/runbooks/kamal-deploy.md`.

service: cms

# GHCR image. CI pushes `ghcr.io/gatispriede/cms:<sha>` per commit.
image: gatispriede/cms

# `servers.web.hosts:` is mandatory in kamal v2 schema. We provide a
# placeholder here that destination overlays replace; bare `kamal config`
# (no destination) would target this placeholder if invoked, but we
# never run kamal without `--destination=` in CI.
servers:
  web:
    hosts:
      - placeholder.invalid
    # Disable kamal-proxy registration for this role.
    # `lib/kamal/configuration/role.rb:168` (kamal v2.11):
    #   "only false means no proxy for non-primary roles"
    # Without this, `kamal app boot` boots the container fine, then
    # tries to `docker exec kamal-proxy kamal-proxy deploy cms-web ...`
    # which fails because kamal-proxy isn't running. The failed proxy
    # registration causes kamal to stop the otherwise-healthy container.
    # Caddy is the public front (operator decision: option A, 2026-05-08).
    proxy: false
    # Container runtime config.
    #
    # `env-file: /opt/cms/.env` — both droplets carry the full runtime
    # env (MONGODB_URI, SMTP_*, INITIAL_ADMIN_*, etc.) at /opt/cms/.env
    # from the legacy compose stack. Same path on both, so this stays
    # in the shared base.
    #
    # Network:
    #   Kamal v2.11 hardcodes `--network kamal` in
    #   `lib/kamal/commands/app.rb:21` — no override available via
    #   deploy.yml. CI step pre-creates the `kamal` network on each
    #   droplet so `kamal app boot` doesn't fail. Real connectivity
    #   comes from a post-boot `docker network connect cms_back-end`
    #   + `cms_front-end` (see ci.yml#deploy-funisimo / deploy-skyclimber).
    options:
      env-file: /opt/cms/.env

# SSH — both droplets currently allow root login. Same `DEPLOY_SSH_KEY`
# private key authorises against both `/root/.ssh/authorized_keys`.
# Hardening to a non-root operator user is a separate item.
ssh:
  user: root

registry:
  server: ghcr.io
  username: gatispriede
  password:
    # Read from Kamal's host env at deploy time. CI sets this from
    # `secrets.GITHUB_TOKEN` (which has packages:read on the repo).
    - GHCR_PAT

# Asset persistence — both droplets keep uploads at /opt/cms/uploads.
volumes:
  - "/opt/cms/uploads:/srv/uploads"

# Builder — runs `docker build` against the multi-stage AppDockerfile.
builder:
  dockerfile: infra/AppDockerfile
  arch: amd64
  args:
    GIT_SHA: <%= `git rev-parse HEAD`.strip %>

# Aliases — convenience commands for operator workflows.
aliases:
  console: app exec --interactive 'node'
  logs: app logs --follow
  shell: app exec --interactive 'sh'
